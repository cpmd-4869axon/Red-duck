<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sentry Node | BLUE_OPS v25.0</title>
    <style>
        :root { 
            --accent: #ff9d00; 
            --packet: #00ff66;
            --bg: #010405; 
            --panel-bg: rgba(5, 5, 10, 0.95);
            --border: rgba(255, 157, 0, 0.4);
        }
        body { margin: 0; overflow: hidden; background: var(--bg); font-family: 'Inter', 'Segoe UI', sans-serif; color: var(--accent); }
        
        #ui-overlay { position: absolute; inset: 0; pointer-events: none; z-index: 100; display: flex; flex-direction: column; justify-content: space-between; padding: 15px; }
        
        .tactical-panel {
            pointer-events: auto; background: var(--panel-bg); 
            border: 1px solid var(--border); 
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px); padding: 12px; border-radius: 2px;
        }

        .top-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
        
        #status-header { 
            font-size: 10px; font-weight: 800; letter-spacing: 2px; 
            border-left: 3px solid var(--accent); padding-left: 8px; 
            margin-bottom: 12px; text-transform: uppercase;
        }
        
        #terminal { 
            font-size: 9px; height: 50px; overflow-y: hidden; 
            color: #888; margin-top: 10px; 
            border-top: 1px solid rgba(255, 255, 255, 0.05); 
            padding-top: 8px; font-family: 'Consolas', monospace; 
        }

        .telemetry-item { margin-bottom: 6px; font-size: 11px; display: flex; justify-content: space-between; width: 180px; color: #aaa; }
        .val { color: #fff; font-family: 'Courier New', monospace; font-weight: bold; }
        
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        button {
            background: rgba(255, 157, 0, 0.08); color: var(--accent); 
            border: 1px solid var(--border);
            padding: 10px; cursor: pointer; text-transform: uppercase; 
            font-size: 9px; font-weight: 800; transition: 0.2s;
            clip-path: polygon(0 0, 100% 0, 100% 75%, 90% 100%, 0 100%);
        }
        button:hover { background: var(--accent); color: #000; border-color: var(--accent); }
    </style>
</head>
<body>

<div id="ui-overlay">
    <div class="top-row">
        <div class="tactical-panel" style="width: 240px;">
            <div id="status-header">SYS // MIDNIGHT_v25.0</div>
            <div class="btn-grid">
                <button onclick="engine.toggleCapture(true)">Connect</button>
                <button onclick="engine.toggleCapture(false)">Drop</button>
                <button style="grid-column: span 2;" onclick="engine.exportCSV()">Export Session</button>
                <button onclick="engine.reCenter()">Recenter</button>
                <button onclick="engine.clearTrail()" style="color: #ff4444; border-color: rgba(255, 68, 68, 0.3);">Purge</button>
            </div>
            <div id="terminal">> Awaiting fix...</div>
        </div>

        <div class="tactical-panel">
            <div class="telemetry-item">NODE COUNT: <span id="val-count" class="val">0</span></div>
            <div class="telemetry-item">LATITUDE: <span id="val-lat" class="val">0.000000</span></div>
            <div class="telemetry-item">LONGITUDE: <span id="val-lon" class="val">0.000000</span></div>
            <div class="telemetry-item">ACCURACY: <span id="val-acc" class="val">0</span>m</div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
class SentryEngine {
    constructor() {
        this.isCapturing = false;
        this.origin = null;
        this.zoom = 19;
        this.tileSize = 512;
        this.history = [];
        this.spheres = [];
        this.lastPosition = null;
        
        this.initCore();
        this.initEntities();
        this.animate();
    }

    latToY(lat, zoom) {
        const rad = lat * Math.PI / 180;
        return (1 - Math.log(Math.tan(rad) + 1 / Math.cos(rad)) / Math.PI) / 2 * Math.pow(2, zoom);
    }
    lonToX(lon, zoom) {
        return (lon + 180) / 360 * Math.pow(2, zoom);
    }

    initCore() {
        this.scene = new THREE.Scene();
        this.scene.fog = new THREE.FogExp2(0x010405, 0.0012);
        
        this.camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 1, 50000);
        this.camera.position.set(0, 700, 500);

        this.renderer = new THREE.WebGLRenderer({ antialias: true });
        this.renderer.setPixelRatio(window.devicePixelRatio);
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.setClearColor(0x010405);
        document.body.appendChild(this.renderer.domElement);

        this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
        this.controls.enableDamping = true;

        // Subdued Lighting
        this.scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        this.amberLight = new THREE.PointLight(0xff9d00, 8, 1200);
        this.scene.add(this.amberLight);
        
        const grid = new THREE.GridHelper(10000, 100, 0xff9d00, 0x111111);
        grid.material.opacity = 0.05;
        grid.material.transparent = true;
        this.scene.add(grid);
    }

    initEntities() {
        this.core = new THREE.Mesh(
            new THREE.OctahedronGeometry(10, 0),
            new THREE.MeshStandardMaterial({ 
                color: 0xff9d00, 
                emissive: 0xff9d00, 
                emissiveIntensity: 0.6,
                metalness: 0.8, 
                roughness: 0.2 
            })
        );
        this.scene.add(this.core);
        this.tilesGroup = new THREE.Group();
        this.scene.add(this.tilesGroup);
    }

    handleGPS(pos) {
        this.lastPosition = pos;
        const { latitude, longitude, accuracy } = pos.coords;

        if (!this.origin) {
            this.origin = {
                x: this.lonToX(longitude, this.zoom),
                y: this.latToY(latitude, this.zoom),
                lat: latitude,
                lon: longitude
            };
            this.updateMap(latitude, longitude);
            document.getElementById('terminal').innerText = "> G-PROJECTION: SYNCED";
        }

        const tX = (this.lonToX(longitude, this.zoom) - this.origin.x) * this.tileSize;
        const tZ = (this.latToY(latitude, this.zoom) - this.origin.y) * this.tileSize;

        this.core.position.set(tX, 35, tZ);
        this.amberLight.position.set(tX, 70, tZ);

        document.getElementById('val-lat').innerText = latitude.toFixed(6);
        document.getElementById('val-lon').innerText = longitude.toFixed(6);
        document.getElementById('val-acc').innerText = Math.round(accuracy);
    }

    dropPacket() {
        if(!this.lastPosition || !this.isCapturing) return;
        const { latitude, longitude } = this.lastPosition.coords;
        const pX = (this.lonToX(longitude, this.zoom) - this.origin.x) * this.tileSize;
        const pZ = (this.latToY(latitude, this.zoom) - this.origin.y) * this.tileSize;

        this.history.push({ lat: latitude, lon: longitude, time: new Date().toLocaleTimeString() });

        const packet = new THREE.Mesh(
            new THREE.BoxGeometry(4, 4, 4),
            new THREE.MeshStandardMaterial({ color: 0x00ff66, emissive: 0x00ff66, emissiveIntensity: 0.8 })
        );
        packet.position.set(pX, 2, pZ);
        this.scene.add(packet);
        this.spheres.push(packet);
        document.getElementById('val-count').innerText = this.history.length;
    }

    updateMap(lat, lon) {
        this.tilesGroup.clear();
        const xC = Math.floor(this.lonToX(lon, this.zoom));
        const yC = Math.floor(this.latToY(lat, this.zoom));
        const loader = new THREE.TextureLoader();

        for (let x = -1; x <= 1; x++) {
            for (let y = -1; y <= 1; y++) {
                const url = `https://tile.openstreetmap.org/${this.zoom}/${xC + x}/${yC + y}.png`;
                loader.load(url, (tex) => {
                    const mat = new THREE.MeshStandardMaterial({ map: tex, color: 0x002233 });
                    const plane = new THREE.Mesh(new THREE.PlaneGeometry(this.tileSize, this.tileSize), mat);
                    plane.rotation.x = -Math.PI / 2;
                    plane.position.set((xC + x + 0.5 - this.origin.x) * this.tileSize, 0, (yC + y + 0.5 - this.origin.y) * this.tileSize);
                    this.tilesGroup.add(plane);
                });
            }
        }
    }

    toggleCapture(state) {
        if(state && !this.isCapturing) {
            this.watchID = navigator.geolocation.watchPosition(p => this.handleGPS(p), null, { enableHighAccuracy: true });
            this.logTimer = setInterval(() => this.dropPacket(), 1000);
            document.getElementById('terminal').innerText = "> 1Hz SCAN ACTIVE";
        } else {
            navigator.geolocation.clearWatch(this.watchID);
            clearInterval(this.logTimer);
            document.getElementById('terminal').innerText = "> STANDBY";
        }
        this.isCapturing = state;
    }

    reCenter() { if(this.core) this.controls.target.copy(this.core.position); }
    
    exportCSV() {
        let csv = "Time,Lat,Lon\n" + this.history.map(h => `${h.time},${h.lat},${h.lon}`).join("\n");
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'SENTRY_DATA.csv'; a.click();
    }

    clearTrail() {
        this.spheres.forEach(s => this.scene.remove(s));
        this.spheres = [];
        this.history = [];
        document.getElementById('val-count').innerText = "0";
    }

    animate() {
        requestAnimationFrame(() => this.animate());
        const time = Date.now() * 0.002;
        this.core.rotation.y += 0.03;
        this.core.position.y = 35 + Math.sin(time) * 3;
        this.controls.update();
        this.renderer.render(this.scene, this.camera);
    }
}
const engine = new SentryEngine();
</script>
</body>
</html>
