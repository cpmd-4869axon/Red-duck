<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geo-Spatial Sentry Node</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Courier New', monospace; }
        #ui-panel {
            position: absolute; top: 10px; left: 10px; z-index: 100;
            display: grid; grid-template-columns: 1fr 1fr; gap: 5px;
            background: rgba(0, 20, 0, 0.8); padding: 10px; border: 1px solid #0f0;
        }
        button {
            background: #000; color: #0f0; border: 1px solid #0f0;
            padding: 8px; cursor: pointer; text-transform: uppercase; font-size: 10px;
        }
        button:hover { background: #0f0; color: #000; }
        #data-overlay {
            position: absolute; bottom: 20px; right: 20px; color: #0f0;
            background: rgba(0,0,0,0.7); padding: 15px; border-left: 3px solid #0f0;
            display: none; pointer-events: none;
        }
    </style>
</head>
<body>

<div id="ui-panel">
    <button onclick="startCapture()">Start</button>
    <button onclick="pauseCapture()">Pause</button>
    <button onclick="stopCapture()">Stop</button>
    <button onclick="exportCSV()">Export</button>
    <input type="file" id="importFile" style="display:none" onchange="importCSV(event)">
    <button onclick="document.getElementById('importFile').click()">Import</button>
    <button onclick="clearData()">Clear</button>
    <button onclick="reCenter()">Re-Center</button>
</div>

<div id="data-overlay"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
/**
 * ARCHITECTURAL OVERVIEW
 * ----------------------
 * The scene uses a 3x3 grid of 3D planes.
 * Leaflet tiles are mapped as textures.
 * GPS data is converted to local 3D coordinates.
 */

let scene, camera, renderer, avatar, ring;
let capturedData = [];
let isCapturing = false;
let captureInterval;
let tiles = new Map(); // Store tile meshes
const TILE_SIZE = 10;
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

// --- Initialization ---

function init() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 10, 10);
    camera.lookAt(0, 0, 0);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Avatar (Triangle)
    const geometry = new THREE.ConeGeometry(0.5, 1, 3);
    const material = new THREE.MeshBasicMaterial({ color: 0x00ff00, wireframe: true });
    avatar = new THREE.Mesh(geometry, material);
    avatar.rotation.x = Math.PI / 2;
    scene.add(avatar);

    // Pulsing Ring
    const ringGeo = new THREE.RingGeometry(0.6, 0.7, 32);
    const ringMat = new THREE.MeshBasicMaterial({ color: 0x00ff00, transparent: true, opacity: 0.5, side: THREE.DoubleSide });
    ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = Math.PI / 2;
    scene.add(ring);

    window.addEventListener('resize', onWindowResize, false);
    window.addEventListener('click', onSphereClick, false);
    
    animate();
    updateTiles();
}

// --- Logic & Functions ---

function startCapture() {
    if (isCapturing) return;
    isCapturing = true;
    captureInterval = setInterval(() => {
        navigator.geolocation.getCurrentPosition(pos => {
            const data = {
                time: new Date().toLocaleTimeString(),
                lat: pos.coords.latitude,
                lon: pos.coords.longitude,
                alt: pos.coords.altitude || 0
            };
            capturedData.push(data);
            dropSphere(data);
        });
    }, 1000);
}

function pauseCapture() {
    isCapturing = false;
    clearInterval(captureInterval);
}

function stopCapture() {
    pauseCapture();
    console.log("Session Ended. Data points:", capturedData.length);
}

function dropSphere(data) {
    const sphereGeo = new THREE.SphereGeometry(0.2, 16, 16);
    const sphereMat = new THREE.MeshBasicMaterial({ color: 0x00ffff });
    const sphere = new THREE.Mesh(sphereGeo, sphereMat);
    
    // Simple Lat/Lon to local conversion (for demo purposes)
    sphere.position.set(
        (data.lon % 0.01) * 1000, 
        0.2, 
        -(data.lat % 0.01) * 1000
    );
    sphere.userData = data;
    scene.add(sphere);
}

function exportCSV() {
    let csvContent = "data:text/csv;charset=utf-8,Time,Lat,Lon,Alt\n" 
        + capturedData.map(e => `${e.time},${e.lat},${e.lon},${e.alt}`).join("\n");
    const encodedUri = encodeURI(csvContent);
    const link = document.createElement("a");
    link.setAttribute("href", encodedUri);
    link.setAttribute("download", "gps_data.csv");
    document.body.appendChild(link);
    link.click();
}

function clearData() {
    capturedData = [];
    scene.children.filter(obj => obj.geometry && obj.geometry.type === "SphereGeometry")
                  .forEach(obj => scene.remove(obj));
}

function reCenter() {
    // 45 degree tilt focus
    camera.position.set(avatar.position.x, 15, avatar.position.z + 15);
    camera.lookAt(avatar.position);
}

// --- Render Loop ---

function animate() {
    requestAnimationFrame(animate);

    const time = performance.now() * 0.001;

    // Avatar Animation
    avatar.position.y = Math.sin(time) * 0.2 + 0.5;
    avatar.rotation.z += 0.01;

    // Ring Pulse
    let scale = (performance.now() % 400) / 400 * 2;
    ring.scale.set(scale, scale, 1);
    ring.material.opacity = 1 - (scale / 2);
    ring.position.copy(avatar.position);
    ring.position.y = 0.05;

    renderer.render(scene, camera);
}

function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

function onSphereClick(event) {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(scene.children);

    for (let i = 0; i < intersects.length; i++) {
        if (intersects[i].object.geometry.type === "SphereGeometry") {
            const obj = intersects[i].object;
            const d = obj.userData;
            obj.scale.set(2, 2, 2);
            document.getElementById('data-overlay').style.display = 'block';
            document.getElementById('data-overlay').innerHTML = `
                <b>DATA PACKET</b><br>
                TIME: ${d.time}<br>
                LAT: ${d.lat.toFixed(6)}<br>
                LON: ${d.lon.toFixed(6)}<br>
                ALT: ${d.alt}
            `;
            setTimeout(() => { 
                obj.scale.set(1, 1, 1); 
                document.getElementById('data-overlay').style.display = 'none';
            }, 3000);
            break;
        }
    }
}

// --- Map Logic (Leaflet Integration Concept) ---
function updateTiles() {
    // This would fetch tiles from OSM/Mapbox using avatar.position 
    // and map them to a 3x3 plane grid.
    const planeGeo = new THREE.PlaneGeometry(TILE_SIZE, TILE_SIZE);
    const planeMat = new THREE.MeshBasicMaterial({ color: 0x111111, side: THREE.DoubleSide });
    
    for(let x = -1; x <= 1; x++) {
        for(let z = -1; z <= 1; z++) {
            const floor = new THREE.Mesh(planeGeo, planeMat);
            floor.rotation.x = -Math.PI / 2;
            floor.position.set(x * TILE_SIZE, 0, z * TILE_SIZE);
            scene.add(floor);
        }
    }
}

init();

</script>
</body>
</html>
