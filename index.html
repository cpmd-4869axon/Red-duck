<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sentry Node | BLUE_OPS v31.0</title>
    <style>
        :root { 
            --accent: #ffae00; 
            --packet: #00ff66;
            --bg: #050505; 
            --panel-bg: rgba(0, 0, 0, 0.9);
            --text-main: #ffffff;
        }
        body { margin: 0; overflow: hidden; background: var(--bg); font-family: 'Segoe UI', Roboto, sans-serif; }
        #ui-overlay { position: absolute; inset: 0; pointer-events: none; z-index: 100; display: flex; flex-direction: column; justify-content: space-between; padding: 15px; }
        .tactical-panel { pointer-events: auto; background: var(--panel-bg); border: 1px solid var(--accent); padding: 15px; border-radius: 4px; box-shadow: 0 0 25px rgba(0,0,0,0.8); }
        #status-header { font-size: 11px; font-weight: 900; letter-spacing: 2px; color: var(--accent); border-bottom: 1px solid rgba(255, 174, 0, 0.2); padding-bottom: 8px; margin-bottom: 12px; }
        .telemetry-item { margin-bottom: 6px; font-size: 10px; display: flex; justify-content: space-between; width: 200px; color: #888; }
        .val { color: var(--text-main); font-family: 'Consolas', monospace; font-weight: bold; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        button { background: rgba(255, 174, 0, 0.05); color: var(--accent); border: 1px solid var(--accent); padding: 12px; cursor: pointer; text-transform: uppercase; font-size: 9px; font-weight: 900; }
        button:hover { background: var(--accent); color: #000; }
        #luma-container { display: flex; align-items: center; gap: 10px; grid-column: span 2; }
        #luma-slider { display: none; width: 100%; height: 4px; appearance: none; background: rgba(255, 174, 0, 0.2); }
        #luma-slider::-webkit-slider-thumb { appearance: none; width: 14px; height: 14px; background: var(--accent); border-radius: 50%; }
        #terminal { font-size: 9px; color: #555; margin-top: 12px; font-family: 'Courier New', monospace; border-top: 1px solid #222; padding-top: 8px; }
    </style>
</head>
<body>

<div id="ui-overlay">
    <div class="top-row" style="display: flex; justify-content: space-between; width: 100%;">
        <div class="tactical-panel">
            <div id="status-header">SENTRY // KINETIC_v31</div>
            <div class="telemetry-item">SPEED: <span id="val-speed" class="val">0.0</span> km/h</div>
            <div class="telemetry-item">HEADING: <span id="val-head" class="val">000</span>°</div>
            <div class="telemetry-item">TRAIL NODES: <span id="val-count" class="val">0</span></div>
            <div class="telemetry-item">ACCURACY: <span id="val-acc" class="val">0</span>m</div>
        </div>

        <div class="tactical-panel" style="width: 260px;">
            <div class="btn-grid">
                <button onclick="engine.toggleCapture(true)">Connect</button>
                <button onclick="engine.toggleCapture(false)">Stop</button>
                <div id="luma-container">
                    <button id="luma-btn" style="width: 100%;" onclick="engine.toggleLumaUI()">Brightness</button>
                    <input type="range" id="luma-slider" min="5" max="100" value="50" oninput="engine.updateBrightness(this.value)">
                </div>
                <button style="grid-column: span 2; border-color: #00ff66; color: #00ff66;" onclick="engine.exportTelemetry()">Export CSV</button>
                <button onclick="engine.reCenter()">Recenter</button>
                <button onclick="engine.clearHistory()" style="color: #ff4444;">Purge</button>
            </div>
            <div id="terminal">> Kinetic systems standby.</div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
class SentryEngine {
    constructor() {
        this.isCapturing = false;
        this.origin = null;
        this.zoom = 18;
        this.tileSize = 512;
        this.history = []; 
        this.spheres = [];
        this.lastPos = null;
        
        this.initCore();
        this.initEntities();
        this.animate();
    }

    latToY(lat, zoom) {
        const rad = lat * Math.PI / 180;
        return (1 - Math.log(Math.tan(rad) + 1 / Math.cos(rad)) / Math.PI) / 2 * Math.pow(2, zoom);
    }
    lonToX(lon, zoom) { return (lon + 180) / 360 * Math.pow(2, zoom); }

    initCore() {
        this.scene = new THREE.Scene();
        this.camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 40000);
        this.camera.position.set(0, 1000, 1000);

        this.renderer = new THREE.WebGLRenderer({ antialias: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(this.renderer.domElement);

        this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
        this.controls.enableDamping = true;

        this.ambient = new THREE.AmbientLight(0xffffff, 0.7);
        this.scene.add(this.ambient);
        
        this.sun = new THREE.DirectionalLight(0xffffff, 0.5);
        this.sun.position.set(200, 1000, 200);
        this.scene.add(this.sun);
    }

    initEntities() {
        // MARKER: Octahedron pointing forward
        const geom = new THREE.OctahedronGeometry(20, 0);
        const mat = new THREE.MeshStandardMaterial({ color: 0xffae00, emissive: 0xffae00, emissiveIntensity: 1 });
        this.core = new THREE.Mesh(geom, mat);
        this.core.position.y = 50;
        this.scene.add(this.core);
        
        this.tilesGroup = new THREE.Group();
        this.scene.add(this.tilesGroup);

        this.packetGroup = new THREE.Group();
        this.scene.add(this.packetGroup);
    }

    toggleLumaUI() {
        const slider = document.getElementById('luma-slider');
        const btn = document.getElementById('luma-btn');
        const isHidden = slider.style.display === 'none' || slider.style.display === '';
        slider.style.display = isHidden ? 'block' : 'none';
        btn.style.width = isHidden ? '30%' : '100%';
        btn.innerText = isHidden ? '🔆' : 'Brightness';
    }

    updateBrightness(val) {
        const f = val / 100;
        this.ambient.intensity = f * 2;
        this.tilesGroup.children.forEach(m => m.material.color.setRGB(f, f, f));
    }

    handleGPS(pos) {
        const { latitude, longitude, accuracy, speed, heading } = pos.coords;
        const currentSpeed = speed ? (speed * 3.6).toFixed(1) : "0.0"; // m/s to km/h
        const currentHeading = heading ? heading.toFixed(0) : "000";

        if (!this.origin) {
            this.origin = { x: this.lonToX(longitude, this.zoom), y: this.latToY(latitude, this.zoom) };
            this.updateMap(latitude, longitude);
        }

        const tX = (this.lonToX(longitude, this.zoom) - this.origin.x) * this.tileSize;
        const tZ = (this.latToY(latitude, this.zoom) - this.origin.y) * this.tileSize;
        
        this.core.position.set(tX, 60, tZ);
        if(heading) this.core.rotation.y = -(heading * Math.PI / 180); // Orient to travel

        if(this.isCapturing) {
            this.dropKineticPacket(tX, tZ, latitude, longitude, currentSpeed);
        }

        document.getElementById('val-speed').innerText = currentSpeed;
        document.getElementById('val-head').innerText = currentHeading;
        document.getElementById('val-acc').innerText = Math.round(accuracy);
    }

    dropKineticPacket(x, z, lat, lon, speed) {
        this.history.push({ time: new Date().toISOString(), lat, lon, speed });
        
        // SPEED COLOR LOGIC
        let pColor = 0x00ff66; // Slow (Green)
        if (speed > 15) pColor = 0xffae00; // Medium (Amber)
        if (speed > 50) pColor = 0xff4444; // Fast (Red)

        const packet = new THREE.Mesh(
            new THREE.SphereGeometry(7, 12, 12),
            new THREE.MeshStandardMaterial({ color: pColor, emissive: pColor, emissiveIntensity: 2 })
        );
        packet.position.set(x, 35, z);
        this.packetGroup.add(packet);
        this.spheres.push(packet);
        document.getElementById('val-count').innerText = this.history.length;
    }

    updateMap(lat, lon) {
        this.tilesGroup.clear();
        const xC = Math.floor(this.lonToX(lon, this.zoom));
        const yC = Math.floor(this.latToY(lat, this.zoom));
        const loader = new THREE.TextureLoader();
        for (let x = -2; x <= 2; x++) {
            for (let y = -2; y <= 2; y++) {
                const url = `https://tile.openstreetmap.org/${this.zoom}/${xC + x}/${yC + y}.png`;
                loader.load(url, (tex) => {
                    const mat = new THREE.MeshStandardMaterial({ map: tex, color: 0x888888 });
                    const plane = new THREE.Mesh(new THREE.PlaneGeometry(this.tileSize, this.tileSize), mat);
                    plane.rotation.x = -Math.PI / 2;
                    plane.position.set((xC + x + 0.5 - this.origin.x) * this.tileSize, 0, (yC + y + 0.5 - this.origin.y) * this.tileSize);
                    this.tilesGroup.add(plane);
                });
            }
        }
    }

    exportTelemetry() {
        if (this.history.length === 0) return;
        const csv = "Timestamp,Lat,Lon,Speed_kmh\n" + this.history.map(pt => `${pt.time},${pt.lat},${pt.lon},${pt.speed}`).join("\n");
        const b = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(b); a.download = `KINETIC_LOG_${Date.now()}.csv`; a.click();
    }

    toggleCapture(state) {
        if(state && !this.isCapturing) {
            this.watchID = navigator.geolocation.watchPosition(p => this.handleGPS(p), null, { enableHighAccuracy: true });
            document.getElementById('terminal').innerText = "> Vector acquisition active.";
        } else {
            navigator.geolocation.clearWatch(this.watchID);
            document.getElementById('terminal').innerText = "> Standby.";
        }
        this.isCapturing = state;
    }

    reCenter() { if(this.core) this.controls.target.copy(this.core.position); }
    clearHistory() { this.packetGroup.clear(); this.history = []; this.spheres = []; document.getElementById('val-count').innerText = "0"; }

    animate() {
        requestAnimationFrame(() => this.animate());
        if(!this.isCapturing) this.core.rotation.y += 0.02;
        this.controls.update();
        this.renderer.render(this.scene, this.camera);
    }
}
const engine = new SentryEngine();
</script>
</body>
</html>
