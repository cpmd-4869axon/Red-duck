<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sentry Node | BLUE_OPS v19.0</title>
    <style>
        :root { 
            --neon-blue: #00f2ff; 
            --highlighter: #00ffff;
            --bg: #000a0d; 
            /* RECALIBRATED FOR READABILITY */
            --map-filter: invert(100%) hue-rotate(100deg) brightness(0.9) contrast(1.4) saturate(2.5);
        }
        body { margin: 0; overflow: hidden; background: var(--bg); font-family: 'Courier New', monospace; color: var(--neon-blue); }
        
        #ui-overlay { position: absolute; inset: 0; pointer-events: none; z-index: 100; }
        .tactical-panel {
            pointer-events: auto; background: rgba(0, 15, 25, 0.9); 
            border: 1px solid var(--neon-blue); box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
            backdrop-filter: blur(8px);
        }
        #main-panel { position: absolute; top: 15px; left: 15px; width: 240px; padding: 12px; border-left: 4px solid var(--highlighter); }
        #status-header { font-size: 10px; font-weight: 900; border-bottom: 1px solid rgba(0, 242, 255, 0.3); padding-bottom: 8px; margin-bottom: 10px; letter-spacing: 1.5px; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        button {
            background: rgba(0, 242, 255, 0.1); color: var(--highlighter); border: 1px solid var(--highlighter);
            padding: 8px; cursor: pointer; text-transform: uppercase; font-size: 9px; font-weight: bold;
        }
        button:active { background: var(--highlighter); color: #000; }
        #telemetry-box { position: absolute; top: 15px; right: 15px; padding: 12px; border-right: 4px solid var(--highlighter); text-align: right; font-size: 10px; }
        .val { color: #fff; font-weight: 900; text-shadow: 0 0 5px var(--neon-blue); }
    </style>
</head>
<body>

<div id="ui-overlay">
    <div id="main-panel" class="tactical-panel">
        <div id="status-header">SENTRY // HI_VIS_READABLE_v19</div>
        <div class="btn-grid">
            <button onclick="engine.toggleCapture(false)">Pause</button>
            <button onclick="engine.toggleCapture(true)">Resume</button>
            <button style="grid-column: span 2; background: rgba(0,242,255,0.2)" onclick="engine.exportCSV()">Export Session CSV</button>
            <button onclick="engine.clearTrail()">Purge Log</button>
            <button onclick="engine.reCenter()">Re-Center</button>
        </div>
    </div>
    <div id="telemetry-box" class="tactical-panel">
        LOGGED: <span id="val-count" class="val">0</span> pts<br>
        LAT: <span id="val-lat" class="val">---</span><br>
        LON: <span id="val-lon" class="val">---</span><br>
        SIGNAL: <span id="val-acc" class="val">---</span>m
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
class SentryEngine {
    constructor() {
        this.isCapturing = false;
        this.origin = null;
        this.scale = 650000; 
        this.zoom = 19;
        this.history = [];
        this.spheres = [];
        this.linePositions = [];
        
        this.initCore();
        this.initEntities();
        this.animate();
        this.toggleCapture(true);
    }

    initCore() {
        this.scene = new THREE.Scene();
        this.camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100000);
        this.camera.position.set(0, 450, 200); 

        this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        this.renderer.setPixelRatio(window.devicePixelRatio);
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(this.renderer.domElement);

        this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
        this.controls.enableDamping = true;
        this.controls.maxPolarAngle = Math.PI / 2.1;

        // HI-VIS LIGHTING RIG
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x000a10, 2.0);
        this.scene.add(hemiLight);

        this.pointLight = new THREE.PointLight(0x00f2ff, 18, 1500);
        this.scene.add(this.pointLight);

        // MAP ILLUMINATOR (Follows Camera)
        this.flashLight = new THREE.DirectionalLight(0xffffff, 0.5);
        this.scene.add(this.flashLight);

        // SEMI-TRANSPARENT GRID
        const grid = new THREE.GridHelper(3000, 60, 0x00f2ff, 0x001a1a);
        grid.position.y = -1;
        grid.material.transparent = true;
        grid.material.opacity = 0.3;
        this.scene.add(grid);
    }

    initEntities() {
        // HI-VIS DIAMOND
        const diamondGeo = new THREE.OctahedronGeometry(9, 0);
        this.diamondMat = new THREE.MeshStandardMaterial({ 
            color: 0x000000, 
            emissive: 0x00f2ff, 
            emissiveIntensity: 8,
            metalness: 1,
            roughness: 0
        });
        this.diamond = new THREE.Mesh(diamondGeo, this.diamondMat);
        this.scene.add(this.diamond);

        this.tilesGroup = new THREE.Group();
        this.scene.add(this.tilesGroup);
        
        // PATH LINE
        this.pathLineGeo = new THREE.BufferGeometry();
        this.pathLineMat = new THREE.LineBasicMaterial({ color: 0x00ffff, linewidth: 3 });
        this.pathLine = new THREE.Line(this.pathLineGeo, this.pathLineMat);
        this.pathLine.renderOrder = 999; 
        this.scene.add(this.pathLine);

        // DATA SPHERES
        this.sphereGeo = new THREE.SphereGeometry(4, 16, 16);
        this.sphereMat = new THREE.MeshStandardMaterial({ 
            color: 0x00ffff, 
            emissive: 0x00ffff, 
            emissiveIntensity: 5
        });
    }

    handleGPS(pos) {
        const { latitude, longitude, accuracy } = pos.coords;
        if (!this.origin) {
            this.origin = { lat: latitude, lon: longitude };
            this.updateMap(latitude, longitude);
        }

        const tX = (longitude - this.origin.lon) * this.scale;
        const tZ = -(latitude - this.origin.lat) * this.scale;
        const tY = 2;

        this.history.push({ time: new Date().toISOString(), lat: latitude, lon: longitude, acc: accuracy });

        const point = new THREE.Mesh(this.sphereGeo, this.sphereMat);
        point.position.set(tX, tY, tZ);
        this.scene.add(point);
        this.spheres.push(point);

        this.linePositions.push(tX, tY + 0.5, tZ);
        this.pathLineGeo.setAttribute('position', new THREE.Float32BufferAttribute(this.linePositions, 3));

        document.getElementById('val-lat').innerText = latitude.toFixed(6);
        document.getElementById('val-lon').innerText = longitude.toFixed(6);
        document.getElementById('val-acc').innerText = accuracy.toFixed(1);
        document.getElementById('val-count').innerText = this.history.length;
        
        this.diamond.position.set(tX, 28, tZ);
        this.pointLight.position.set(tX, 60, tZ);
    }

    updateMap(lat, lon) {
        this.tilesGroup.clear();
        const z = this.zoom;
        const xC = Math.floor((lon + 180) / 360 * Math.pow(2, z));
        const yC = Math.floor((1 - Math.log(Math.tan(lat * Math.PI / 180) + 1 / Math.cos(lat * Math.PI / 180)) / Math.PI) / 2 * Math.pow(2, z));
        const loader = new THREE.TextureLoader();

        for (let x = -2; x <= 2; x++) {
            for (let y = -2; y <= 2; y++) {
                const url = `https://tile.openstreetmap.org/${z}/${xC + x}/${yC + y}.png`;
                loader.load(url, (tex) => {
                    const plane = new THREE.Mesh(
                        new THREE.PlaneGeometry(120, 120), 
                        new THREE.MeshStandardMaterial({ map: tex, metalness: 0, roughness: 1 })
                    );
                    plane.rotation.x = -Math.PI / 2;
                    plane.position.set(x * 120, -2.5, y * 120); // Moved up for visibility
                    plane.onBeforeRender = () => { this.renderer.domElement.style.filter = "var(--map-filter)"; };
                    this.tilesGroup.add(plane);
                });
            }
        }
    }

    reCenter() {
        this.camera.position.set(this.diamond.position.x, 450, this.diamond.position.z + 200);
        this.controls.target.copy(this.diamond.position);
    }

    exportCSV() {
        let csv = "Timestamp,Latitude,Longitude,Accuracy_m\n";
        this.history.forEach(r => csv += `${r.time},${r.lat},${r.lon},${r.acc}\n`);
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `Sentry_HiVis_v19_${Date.now()}.csv`;
        a.click();
    }

    toggleCapture(state) {
        this.isCapturing = state;
        if (state) this.watchID = navigator.geolocation.watchPosition(p => this.handleGPS(p), null, { enableHighAccuracy: true });
        else navigator.geolocation.clearWatch(this.watchID);
    }

    clearTrail() {
        this.spheres.forEach(s => this.scene.remove(s));
        this.spheres = [];
        this.history = [];
        this.linePositions = [];
        this.pathLineGeo.setAttribute('position', new THREE.Float32BufferAttribute([], 3));
        document.getElementById('val-count').innerText = "0";
    }

    animate() {
        requestAnimationFrame(() => this.animate());
        const time = Date.now() * 0.003;
        this.diamond.rotation.y += 0.08;
        this.diamond.position.y = 28 + Math.sin(time) * 4; // Hover effect
        this.diamondMat.emissiveIntensity = 6 + Math.sin(time * 2) * 3;
        
        this.flashLight.position.copy(this.camera.position);
        this.flashLight.lookAt(this.controls.target);
        
        this.controls.update();
        this.renderer.render(this.scene, this.camera);
    }
}
const engine = new SentryEngine();
</script>
</body>
</html>
