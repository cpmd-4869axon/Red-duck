<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sentry Node | BLUE_OPS v32.0</title>
    <style>
        :root { 
            --accent: #ffae00; 
            --packet: #00ff66;
            --bg: #050505; 
            --panel-bg: rgba(0, 0, 0, 0.92);
            --text-main: #ffffff;
        }
        body { margin: 0; overflow: hidden; background: var(--bg); font-family: 'Segoe UI', sans-serif; }
        #ui-overlay { position: absolute; inset: 0; pointer-events: none; z-index: 100; display: flex; flex-direction: column; justify-content: space-between; padding: 15px; }
        .tactical-panel { pointer-events: auto; background: var(--panel-bg); border: 1px solid var(--accent); padding: 12px; border-radius: 2px; box-shadow: 0 0 40px rgba(0,0,0,0.9); }
        #status-header { font-size: 10px; font-weight: 900; letter-spacing: 3px; color: var(--accent); border-bottom: 1px solid rgba(255, 174, 0, 0.2); padding-bottom: 6px; margin-bottom: 10px; text-transform: uppercase; }
        .telemetry-item { margin-bottom: 4px; font-size: 10px; display: flex; justify-content: space-between; width: 210px; color: #777; }
        .val { color: var(--text-main); font-family: 'Consolas', monospace; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 10px; }
        button { background: rgba(255, 174, 0, 0.05); color: var(--accent); border: 1px solid var(--accent); padding: 10px; cursor: pointer; text-transform: uppercase; font-size: 9px; font-weight: 900; transition: 0.2s; }
        button:hover { background: var(--accent); color: #000; }
        #luma-container { display: flex; align-items: center; gap: 8px; grid-column: span 2; }
        #luma-slider { display: none; width: 100%; height: 2px; appearance: none; background: var(--accent); opacity: 0.5; }
        #luma-slider::-webkit-slider-thumb { appearance: none; width: 10px; height: 10px; background: #fff; border-radius: 50%; }
        #terminal { font-size: 9px; color: #444; margin-top: 10px; font-family: monospace; }
    </style>
</head>
<body>

<div id="ui-overlay">
    <div class="top-row" style="display: flex; justify-content: space-between; width: 100%;">
        <div class="tactical-panel">
            <div id="status-header">SENTRY // STRAND_v32</div>
            <div class="telemetry-item">VELOCITY: <span id="val-speed" class="val">0.0</span> km/h</div>
            <div class="telemetry-item">VECTOR: <span id="val-head" class="val">000</span>°</div>
            <div class="telemetry-item">STRAND NODES: <span id="val-count" class="val">0</span></div>
            <div class="telemetry-item">GPS_PRECISION: <span id="val-acc" class="val">0</span>m</div>
        </div>

        <div class="tactical-panel" style="width: 260px;">
            <div class="btn-grid">
                <button onclick="engine.toggleCapture(true)">Initialize</button>
                <button onclick="engine.toggleCapture(false)">Suspend</button>
                <div id="luma-container">
                    <button id="luma-btn" style="width: 100%;" onclick="engine.toggleLumaUI()">Luma</button>
                    <input type="range" id="luma-slider" min="5" max="100" value="60" oninput="engine.updateBrightness(this.value)">
                </div>
                <button style="grid-column: span 2; border-color: #00ff66; color: #00ff66;" onclick="engine.exportTelemetry()">Export Strand (.CSV)</button>
                <button onclick="engine.reCenter()">Recenter</button>
                <button onclick="engine.clearHistory()" style="color: #ff4444; border-color: #ff4444;">Purge</button>
            </div>
            <div id="terminal">> System Link: ONLINE</div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
class SentryEngine {
    constructor() {
        this.isCapturing = false;
        this.origin = null;
        this.zoom = 18;
        this.tileSize = 512;
        this.history = []; 
        this.pathPoints = [];
        this.targetPos = new THREE.Vector3(0, 60, 0);
        
        this.initCore();
        this.initEntities();
        this.animate();
    }

    latToY(lat, z) { return (1 - Math.log(Math.tan(lat * Math.PI / 180) + 1 / Math.cos(lat * Math.PI / 180)) / Math.PI) / 2 * Math.pow(2, z); }
    lonToX(lon, z) { return (lon + 180) / 360 * Math.pow(2, z); }

    initCore() {
        this.scene = new THREE.Scene();
        this.camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 50000);
        this.camera.position.set(0, 1500, 1500);

        this.renderer = new THREE.WebGLRenderer({ antialias: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(this.renderer.domElement);

        this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
        this.controls.enableDamping = true;

        this.ambient = new THREE.AmbientLight(0xffffff, 0.8);
        this.scene.add(this.ambient);
    }

    initEntities() {
        // MARKER
        this.core = new THREE.Mesh(
            new THREE.OctahedronGeometry(22, 0),
            new THREE.MeshStandardMaterial({ color: 0xffae00, emissive: 0xffae00, emissiveIntensity: 1 })
        );
        this.scene.add(this.core);
        
        this.tilesGroup = new THREE.Group();
        this.scene.add(this.tilesGroup);

        // STRAND (THE CONTINUOUS LINE)
        this.strandMaterial = new THREE.LineBasicMaterial({ color: 0x00ff66 });
        this.strandGeometry = new THREE.BufferGeometry();
        this.strandLine = new THREE.Line(this.strandGeometry, this.strandMaterial);
        this.scene.add(this.strandLine);
    }

    toggleLumaUI() {
        const s = document.getElementById('luma-slider');
        const b = document.getElementById('luma-btn');
        const hide = s.style.display === 'block';
        s.style.display = hide ? 'none' : 'block';
        b.style.width = hide ? '100%' : '30%';
        b.innerText = hide ? 'Luma' : '🔆';
    }

    updateBrightness(v) {
        const f = v / 100;
        this.ambient.intensity = f * 2.5;
        this.tilesGroup.children.forEach(m => m.material.color.setRGB(f, f, f));
    }

    handleGPS(pos) {
        const { latitude, longitude, accuracy, speed, heading, altitude } = pos.coords;
        const s_kmh = speed ? (speed * 3.6).toFixed(1) : "0.0";
        
        if (!this.origin) {
            this.origin = { x: this.lonToX(longitude, this.zoom), y: this.latToY(latitude, this.zoom) };
            this.updateMap(latitude, longitude);
        }

        const tX = (this.lonToX(longitude, this.zoom) - this.origin.x) * this.tileSize;
        const tZ = (this.latToY(latitude, this.zoom) - this.origin.y) * this.tileSize;
        
        this.targetPos.set(tX, 60, tZ);
        if(heading) this.core.rotation.y = -(heading * Math.PI / 180);

        if(this.isCapturing) {
            this.history.push({ time: new Date().toISOString(), lat: latitude, lon: longitude, spd: s_kmh });
            this.pathPoints.push(new THREE.Vector3(tX, 35, tZ));
            this.updateStrand();
        }

        document.getElementById('val-speed').innerText = s_kmh;
        document.getElementById('val-head').innerText = heading ? heading.toFixed(0) : "000";
        document.getElementById('val-acc').innerText = Math.round(accuracy);
        document.getElementById('val-count').innerText = this.history.length;
    }

    updateStrand() {
        if(this.pathPoints.length < 2) return;
        this.strandGeometry.setFromPoints(this.pathPoints);
    }

    updateMap(lat, lon) {
        this.tilesGroup.clear();
        const xC = Math.floor(this.lonToX(lon, this.zoom));
        const yC = Math.floor(this.latToY(lat, this.zoom));
        const loader = new THREE.TextureLoader();
        for (let x = -2; x <= 2; x++) {
            for (let y = -2; y <= 2; y++) {
                const url = `https://tile.openstreetmap.org/${this.zoom}/${xC + x}/${yC + y}.png`;
                loader.load(url, (tex) => {
                    const mat = new THREE.MeshStandardMaterial({ map: tex, color: 0x999999 });
                    const plane = new THREE.Mesh(new THREE.PlaneGeometry(this.tileSize, this.tileSize), mat);
                    plane.rotation.x = -Math.PI / 2;
                    plane.position.set((xC+x+0.5-this.origin.x)*this.tileSize, 0, (yC+y+0.5-this.origin.y)*this.tileSize);
                    this.tilesGroup.add(plane);
                });
            }
        }
    }

    exportTelemetry() {
        if (!this.history.length) return;
        const csv = "Timestamp,Lat,Lon,KmH\n" + this.history.map(p => `${p.time},${p.lat},${p.lon},${p.spd}`).join("\n");
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
        a.download = `STRAND_LOG_${Date.now()}.csv`; a.click();
    }

    toggleCapture(s) {
        if(s && !this.isCapturing) {
            this.watchID = navigator.geolocation.watchPosition(p => this.handleGPS(p), null, { enableHighAccuracy: true });
            document.getElementById('terminal').innerText = "> Strand acquisition: ACTIVE";
        } else {
            navigator.geolocation.clearWatch(this.watchID);
            document.getElementById('terminal').innerText = "> Strand acquisition: SUSPENDED";
        }
        this.isCapturing = s;
    }

    reCenter() { this.controls.target.lerp(this.core.position, 0.1); }
    clearHistory() { this.history = []; this.pathPoints = []; this.strandGeometry.setFromPoints([]); }

    animate() {
        requestAnimationFrame(() => this.animate());
        // Smooth gliding movement
        this.core.position.lerp(this.targetPos, 0.05);
        if(!this.isCapturing) this.core.rotation.y += 0.015;
        this.controls.update();
        this.renderer.render(this.scene, this.camera);
    }
}
const engine = new SentryEngine();
</script>
</body>
</html>
