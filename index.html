<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sentry Node | BLUE_OPS v30.0</title>
    <style>
        :root { 
            --accent: #ffae00; 
            --packet: #00ff66;
            --bg: #050505; 
            --panel-bg: rgba(0, 0, 0, 0.95);
            --text-main: #ffffff;
        }
        body { margin: 0; overflow: hidden; background: var(--bg); font-family: 'Segoe UI', sans-serif; }
        #ui-overlay { position: absolute; inset: 0; pointer-events: none; z-index: 100; display: flex; flex-direction: column; justify-content: space-between; padding: 15px; }
        .tactical-panel { pointer-events: auto; background: var(--panel-bg); border: 1px solid var(--accent); padding: 15px; border-radius: 4px; backdrop-filter: blur(10px); }
        #status-header { font-size: 11px; font-weight: 900; letter-spacing: 2px; color: var(--accent); border-bottom: 1px solid rgba(255, 174, 0, 0.2); padding-bottom: 8px; margin-bottom: 12px; }
        .telemetry-item { margin-bottom: 6px; font-size: 10px; display: flex; justify-content: space-between; width: 190px; color: #888; }
        .val { color: var(--text-main); font-family: 'Consolas', monospace; font-weight: bold; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        button { background: rgba(255, 174, 0, 0.05); color: var(--accent); border: 1px solid var(--accent); padding: 12px; cursor: pointer; text-transform: uppercase; font-size: 9px; font-weight: 900; border-radius: 2px; }
        button:hover { background: var(--accent); color: #000; }
        #luma-container { display: flex; align-items: center; gap: 10px; grid-column: span 2; }
        #luma-slider { display: none; width: 100%; height: 4px; appearance: none; background: rgba(255, 174, 0, 0.2); }
        #luma-slider::-webkit-slider-thumb { appearance: none; width: 14px; height: 14px; background: var(--accent); border-radius: 50%; }
        #terminal { font-size: 9px; color: #555; margin-top: 12px; font-family: 'Courier New', monospace; border-top: 1px solid #222; padding-top: 8px; }
    </style>
</head>
<body>

<div id="ui-overlay">
    <div class="top-row" style="display: flex; justify-content: space-between; width: 100%;">
        <div class="tactical-panel">
            <div id="status-header">SENTRY // VISUAL_FIX_v30</div>
            <div class="telemetry-item">TRAIL NODES: <span id="val-count" class="val">0</span></div>
            <div class="telemetry-item">CURR_LAT: <span id="val-lat" class="val">0.000000</span></div>
            <div class="telemetry-item">CURR_LON: <span id="val-lon" class="val">0.000000</span></div>
        </div>

        <div class="tactical-panel" style="width: 250px;">
            <div class="btn-grid">
                <button onclick="engine.toggleCapture(true)">Connect</button>
                <button onclick="engine.toggleCapture(false)">Stop</button>
                <div id="luma-container">
                    <button id="luma-btn" style="width: 100%;" onclick="engine.toggleLumaUI()">Brightness</button>
                    <input type="range" id="luma-slider" min="5" max="100" value="50" oninput="engine.updateBrightness(this.value)">
                </div>
                <button style="grid-column: span 2; border-color: var(--packet); color: var(--packet);" onclick="engine.exportTelemetry()">Export (.CSV)</button>
                <button onclick="engine.reCenter()">Recenter</button>
                <button onclick="engine.clearHistory()" style="color: #ff4444;">Purge</button>
            </div>
            <div id="terminal">> Visibility patches applied.</div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
class SentryEngine {
    constructor() {
        this.isCapturing = false;
        this.origin = null;
        this.zoom = 18;
        this.tileSize = 512;
        this.history = []; 
        this.spheres = [];
        
        this.initCore();
        this.initEntities();
        this.animate();
    }

    latToY(lat, zoom) {
        const rad = lat * Math.PI / 180;
        return (1 - Math.log(Math.tan(rad) + 1 / Math.cos(rad)) / Math.PI) / 2 * Math.pow(2, zoom);
    }
    lonToX(lon, zoom) { return (lon + 180) / 360 * Math.pow(2, zoom); }

    initCore() {
        this.scene = new THREE.Scene();
        this.scene.background = new THREE.Color(0x050505);
        this.camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 40000);
        this.camera.position.set(0, 1200, 1200);

        this.renderer = new THREE.WebGLRenderer({ antialias: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(this.renderer.domElement);

        this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
        this.controls.enableDamping = true;

        this.ambient = new THREE.AmbientLight(0xffffff, 0.6);
        this.scene.add(this.ambient);

        this.sun = new THREE.DirectionalLight(0xffffff, 0.5);
        this.sun.position.set(500, 2000, 250);
        this.scene.add(this.sun);
    }

    initEntities() {
        // Main Marker
        this.core = new THREE.Mesh(
            new THREE.OctahedronGeometry(18, 0),
            new THREE.MeshStandardMaterial({ color: 0xffae00, emissive: 0xffae00, emissiveIntensity: 1 })
        );
        this.core.position.y = 50; // Keep marker high
        this.scene.add(this.core);
        
        this.tilesGroup = new THREE.Group();
        this.scene.add(this.tilesGroup);

        this.packetGroup = new THREE.Group(); // Separate group for trail visibility
        this.scene.add(this.packetGroup);
    }

    toggleLumaUI() {
        const btn = document.getElementById('luma-btn');
        const slider = document.getElementById('luma-slider');
        const isHidden = slider.style.display === 'none' || slider.style.display === '';
        btn.style.width = isHidden ? '30%' : '100%';
        btn.innerText = isHidden ? '🔅' : 'Brightness';
        slider.style.display = isHidden ? 'block' : 'none';
    }

    updateBrightness(val) {
        const factor = val / 100;
        this.ambient.intensity = factor * 2;
        this.tilesGroup.children.forEach(mesh => mesh.material.color.setRGB(factor, factor, factor));
    }

    handleGPS(pos) {
        const { latitude, longitude, accuracy } = pos.coords;
        
        if (!this.origin) {
            this.origin = { x: this.lonToX(longitude, this.zoom), y: this.latToY(latitude, this.zoom) };
            this.updateMap(latitude, longitude);
        }

        const tX = (this.lonToX(longitude, this.zoom) - this.origin.x) * this.tileSize;
        const tZ = (this.latToY(latitude, this.zoom) - this.origin.y) * this.tileSize;
        
        this.core.position.set(tX, 60, tZ);
        
        // Log movement and drop visible packet
        if(this.isCapturing) {
            this.dropPacket(tX, tZ, latitude, longitude, accuracy);
        }

        document.getElementById('val-lat').innerText = latitude.toFixed(6);
        document.getElementById('val-lon').innerText = longitude.toFixed(6);
    }

    dropPacket(x, z, lat, lon, acc) {
        this.history.push({ time: new Date().toISOString(), lat, lon, acc });
        
        // VISIBILITY FIX: Sphere is now larger and elevated to Y=30
        const packet = new THREE.Mesh(
            new THREE.SphereGeometry(6, 8, 8),
            new THREE.MeshStandardMaterial({ 
                color: 0x00ff66, 
                emissive: 0x00ff66, 
                emissiveIntensity: 1.5 
            })
        );
        packet.position.set(x, 30, z); // Elevated off the ground
        this.packetGroup.add(packet);
        this.spheres.push(packet);
        
        document.getElementById('val-count').innerText = this.history.length;
    }

    updateMap(lat, lon) {
        this.tilesGroup.clear();
        const xC = Math.floor(this.lonToX(lon, this.zoom));
        const yC = Math.floor(this.latToY(lat, this.zoom));
        const loader = new THREE.TextureLoader();

        for (let x = -2; x <= 2; x++) {
            for (let y = -2; y <= 2; y++) {
                const url = `https://tile.openstreetmap.org/${this.zoom}/${xC + x}/${yC + y}.png`;
                loader.load(url, (tex) => {
                    const mat = new THREE.MeshStandardMaterial({ map: tex, color: 0x888888 });
                    const plane = new THREE.Mesh(new THREE.PlaneGeometry(this.tileSize, this.tileSize), mat);
                    plane.rotation.x = -Math.PI / 2;
                    plane.position.set((xC + x + 0.5 - this.origin.x) * this.tileSize, 0, (yC + y + 0.5 - this.origin.y) * this.tileSize);
                    this.tilesGroup.add(plane);
                });
            }
        }
    }

    exportTelemetry() {
        if (this.history.length === 0) return;
        const csv = "Timestamp,Lat,Lon,Acc\n" + this.history.map(pt => `${pt.time},${pt.lat},${pt.lon},${pt.acc}`).join("\n");
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `SENTRY_v30_${Date.now()}.csv`;
        a.click();
    }

    toggleCapture(state) {
        if(state && !this.isCapturing) {
            this.watchID = navigator.geolocation.watchPosition(p => this.handleGPS(p), null, { enableHighAccuracy: true });
            document.getElementById('terminal').innerText = "> Data sphere tracking: ON";
        } else {
            navigator.geolocation.clearWatch(this.watchID);
            document.getElementById('terminal').innerText = "> Tracking: OFF";
        }
        this.isCapturing = state;
    }

    reCenter() { if(this.core) this.controls.target.copy(this.core.position); }
    
    clearHistory() {
        this.packetGroup.clear();
        this.history = [];
        this.spheres = [];
        document.getElementById('val-count').innerText = "0";
    }

    animate() {
        requestAnimationFrame(() => this.animate());
        this.core.rotation.y += 0.04;
        // Pulse the packets for visibility
        const pulse = Math.sin(Date.now() * 0.005) * 0.5 + 1.5;
        this.spheres.forEach(s => s.material.emissiveIntensity = pulse);
        this.controls.update();
        this.renderer.render(this.scene, this.camera);
    }
}
const engine = new SentryEngine();
</script>
</body>
</html>
