<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sentry Node | BLUE_OPS v22.0</title>
    <style>
        :root { 
            --neon-blue: #00d4ff; 
            --highlighter: #ccf5ff;
            --danger: #ff3366;
            --bg: #000c0f; 
            --panel-bg: rgba(0, 15, 20, 0.92);
        }
        body { margin: 0; overflow: hidden; background: var(--bg); font-family: 'Segoe UI', sans-serif; color: var(--neon-blue); }
        
        #ui-overlay { position: absolute; inset: 0; pointer-events: none; z-index: 100; display: flex; flex-direction: column; justify-content: space-between; padding: 15px; }
        
        .tactical-panel {
            pointer-events: auto; background: var(--panel-bg); 
            border: 1px solid rgba(0, 212, 255, 0.3); 
            box-shadow: 0 0 15px rgba(0,0,0,0.8);
            backdrop-filter: blur(10px); padding: 12px;
        }

        .top-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
        #status-header { font-size: 11px; font-weight: 900; letter-spacing: 2px; border-left: 3px solid var(--neon-blue); padding-left: 8px; margin-bottom: 12px; }
        
        #terminal { font-size: 9px; height: 75px; overflow-y: hidden; color: rgba(204, 245, 255, 0.6); margin-top: 10px; border-top: 1px solid rgba(0, 212, 255, 0.15); padding-top: 5px; line-height: 1.4; }
        
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        button {
            background: rgba(0, 212, 255, 0.08); color: var(--highlighter); border: 1px solid rgba(0, 212, 255, 0.4);
            padding: 10px 5px; cursor: pointer; text-transform: uppercase; font-size: 9px; font-weight: bold;
            clip-path: polygon(0 0, 90% 0, 100% 20%, 100% 100%, 10% 100%, 0 80%);
            transition: all 0.2s;
        }
        button:hover { background: rgba(0, 212, 255, 0.2); border-color: var(--neon-blue); }
        button:active { background: var(--neon-blue); color: #000; }

        .telemetry-item { margin-bottom: 4px; font-size: 10px; display: flex; justify-content: space-between; width: 150px; }
        .val { color: #fff; font-family: 'Courier New', monospace; font-weight: bold; text-shadow: 0 0 5px var(--neon-blue); }
    </style>
</head>
<body>

<div id="ui-overlay">
    <div class="top-row">
        <div id="main-panel" class="tactical-panel" style="flex-grow: 1; max-width: 250px;">
            <div id="status-header">SENTRY // MULTI_SPEC_V22</div>
            <div class="btn-grid">
                <button onclick="engine.toggleCapture(true)">Connect</button>
                <button onclick="engine.toggleCapture(false)">Disconnect</button>
                <button style="grid-column: span 2;" onclick="engine.exportCSV()">Download Telemetry</button>
                <button onclick="engine.reCenter()">Sync Camera</button>
                <button onclick="engine.clearTrail()" style="color: var(--danger); border-color: rgba(255, 51, 102, 0.4);">Purge</button>
            </div>
            <div id="terminal">System: Wide-spectrum lighting active...<br>Uplink: Standing by...</div>
        </div>

        <div id="telemetry-box" class="tactical-panel">
            <div class="telemetry-item">NODES: <span id="val-count" class="val">0</span></div>
            <div class="telemetry-item">LAT: <span id="val-lat" class="val">0.0000</span></div>
            <div class="telemetry-item">LON: <span id="val-lon" class="val">0.0000</span></div>
            <div class="telemetry-item">ACC: <span id="val-acc" class="val">0</span>m</div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
class SentryEngine {
    constructor() {
        this.isCapturing = false;
        this.origin = null;
        this.scale = 850000; 
        this.history = [];
        this.spheres = [];
        this.lights = [];
        
        this.initCore();
        this.initEntities();
        this.animate();
    }

    log(msg) {
        const t = document.getElementById('terminal');
        t.innerHTML = `> ${msg}<br>` + t.innerHTML;
    }

    initCore() {
        this.scene = new THREE.Scene();
        this.scene.fog = new THREE.FogExp2(0x000c0f, 0.001);

        this.camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 1, 200000);
        this.camera.position.set(0, 550, 400);

        this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        this.renderer.setPixelRatio(window.devicePixelRatio);
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.outputEncoding = THREE.sRGBEncoding;
        document.body.appendChild(this.renderer.domElement);

        this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
        this.controls.enableDamping = true;

        // --- MULTI-LIGHTING SETUP ---
        
        // 1. Global Ambient (Increases general visibility)
        const ambient = new THREE.AmbientLight(0xffffff, 0.8); 
        this.scene.add(ambient);

        // 2. Primary Tracking Point Light (Vibrant Blue)
        this.mainLight = new THREE.PointLight(0x00d4ff, 15, 1200);
        this.scene.add(this.mainLight);

        // 3. Directional "Sun" Light (Soft White for Map Clarity)
        this.sunLight = new THREE.DirectionalLight(0xffffff, 0.5);
        this.sunLight.position.set(500, 1000, 500);
        this.scene.add(this.sunLight);

        // 4. Secondary Fill Light (Warmth for depth)
        const fillLight = new THREE.PointLight(0x003344, 10, 2000);
        fillLight.position.set(-500, 200, -500);
        this.scene.add(fillLight);

        // Grid
        const grid = new THREE.GridHelper(5000, 50, 0x00d4ff, 0x002222);
        grid.material.opacity = 0.2;
        grid.material.transparent = true;
        this.scene.add(grid);
    }

    initEntities() {
        // High-Vis Core
        const geo = new THREE.IcosahedronGeometry(12, 0);
        this.coreMat = new THREE.MeshStandardMaterial({
            color: 0x00d4ff,
            emissive: 0x00d4ff,
            emissiveIntensity: 1.5,
            roughness: 0.1,
            metalness: 0.8,
            wireframe: false
        });
        this.core = new THREE.Mesh(geo, this.coreMat);
        this.scene.add(this.core);

        // Secondary Wireframe Layer for "Tech" look
        const wire = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true, transparent: true, opacity: 0.3 }));
        this.core.add(wire);

        this.tilesGroup = new THREE.Group();
        this.scene.add(this.tilesGroup);
    }

    handleGPS(pos) {
        const { latitude, longitude, accuracy } = pos.coords;
        if (!this.origin) {
            this.origin = { lat: latitude, lon: longitude };
            this.updateMap(latitude, longitude);
            this.log("Coordinates Locked.");
        }

        const tX = (longitude - this.origin.lon) * this.scale;
        const tZ = -(latitude - this.origin.lat) * this.scale;

        this.history.push({ lat: latitude, lon: longitude, time: new Date().toLocaleTimeString() });

        // Illuminated Node Marker
        const nodeGeo = new THREE.SphereGeometry(4, 16, 16);
        const nodeMat = new THREE.MeshStandardMaterial({ 
            color: 0xffffff, 
            emissive: 0x00d4ff, 
            emissiveIntensity: 2 
        });
        const marker = new THREE.Mesh(nodeGeo, nodeMat);
        marker.position.set(tX, 4, tZ);
        this.scene.add(marker);
        this.spheres.push(marker);

        // UI Update
        document.getElementById('val-lat').innerText = latitude.toFixed(4);
        document.getElementById('val-lon').innerText = longitude.toFixed(4);
        document.getElementById('val-acc').innerText = Math.round(accuracy);
        document.getElementById('val-count').innerText = this.history.length;

        // Position Main Tracking Light
        this.core.position.set(tX, 35, tZ);
        this.mainLight.position.set(tX, 60, tZ);
        
        if(this.history.length % 5 === 0) this.log(`Update: Recalibrated at ${accuracy}m`);
    }

    updateMap(lat, lon) {
        this.tilesGroup.clear();
        const z = 18;
        const xC = Math.floor((lon + 180) / 360 * Math.pow(2, z));
        const yC = Math.floor((1 - Math.log(Math.tan(lat * Math.PI / 180) + 1 / Math.cos(lat * Math.PI / 180)) / Math.PI) / 2 * Math.pow(2, z));
        
        const loader = new THREE.TextureLoader();
        for (let x = -1; x <= 1; x++) {
            for (let y = -1; y <= 1; y++) {
                const url = `https://tile.openstreetmap.org/${z}/${xC + x}/${yC + y}.png`;
                loader.load(url, (tex) => {
                    const mat = new THREE.MeshStandardMaterial({ 
                        map: tex, 
                        color: 0x44ccff, // Teal-Blue base for map
                        emissive: 0x112233, // Subtle glow
                        metalness: 0.2,
                        roughness: 0.8
                    });
                    const plane = new THREE.Mesh(new THREE.PlaneGeometry(300, 300), mat);
                    plane.rotation.x = -Math.PI / 2;
                    plane.position.set(x * 300, 0, y * 300);
                    this.tilesGroup.add(plane);
                });
            }
        }
    }

    toggleCapture(state) {
        if(state && !this.isCapturing) {
            this.watchID = navigator.geolocation.watchPosition(p => this.handleGPS(p), null, { enableHighAccuracy: true });
            this.log("Multi-light uplink active.");
        } else {
            navigator.geolocation.clearWatch(this.watchID);
            this.log("Uplink paused.");
        }
        this.isCapturing = state;
    }

    reCenter() {
        this.controls.target.copy(this.core.position);
    }

    exportCSV() {
        let csv = "Time,Lat,Lon\n" + this.history.map(h => `${h.time},${h.lat},${h.lon}`).join("\n");
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `SENTRY_V22_DATA.csv`;
        link.click();
    }

    clearTrail() {
        this.spheres.forEach(s => this.scene.remove(s));
        this.spheres = [];
        this.history = [];
        this.log("Cache cleared.");
    }

    animate() {
        requestAnimationFrame(() => this.animate());
        const time = Date.now() * 0.002;

        this.core.rotation.y += 0.03;
        this.core.rotation.x += 0.01;
        this.core.position.y = 35 + Math.sin(time) * 4;
        this.coreMat.emissiveIntensity = 1 + Math.sin(time * 1.5) * 0.5;

        this.controls.update();
        this.renderer.render(this.scene, this.camera);
    }
}

const engine = new SentryEngine();
</script>
</body>
</html>
