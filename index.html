<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sentry Node | BLUE_OPS v13.0</title>
    <style>
        :root { 
            --neon-blue: #00f2ff; 
            --highlighter: #00ffff;
            --bg: #000508; 
            --map-filter: invert(100%) hue-rotate(95deg) brightness(0.3) sepia(0.8) saturate(7) contrast(1.3);
        }
        body { margin: 0; overflow: hidden; background: var(--bg); font-family: 'Courier New', monospace; color: var(--neon-blue); }
        
        #ui-overlay { position: absolute; inset: 0; pointer-events: none; z-index: 100; }
        .tactical-panel {
            pointer-events: auto; background: rgba(0, 10, 20, 0.95); 
            border: 1px solid var(--neon-blue); box-shadow: 0 0 15px rgba(0, 242, 255, 0.4);
            backdrop-filter: blur(10px);
        }
        #main-panel { position: absolute; top: 20px; left: 20px; width: 250px; padding: 15px; border-left: 5px solid var(--neon-blue); }
        #status-header { font-size: 11px; font-weight: bold; border-bottom: 1px solid rgba(0, 242, 255, 0.3); padding-bottom: 10px; margin-bottom: 12px; letter-spacing: 2px; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        button {
            background: rgba(0, 242, 255, 0.05); color: var(--neon-blue); border: 1px solid var(--neon-blue);
            padding: 10px; cursor: pointer; text-transform: uppercase; font-size: 9px;
            font-weight: 900; transition: 0.2s;
        }
        button:hover { background: var(--neon-blue); color: #000; }
        #telemetry-box { position: absolute; top: 20px; right: 20px; padding: 15px; border-right: 5px solid var(--neon-blue); text-align: right; font-size: 11px; }
        .val { color: #fff; font-weight: bold; text-shadow: 0 0 5px var(--neon-blue); }
    </style>
</head>
<body>

<div id="ui-overlay">
    <div id="main-panel" class="tactical-panel">
        <div id="status-header">SENTRY // DATA_LOG_v13</div>
        <div class="btn-grid">
            <button onclick="engine.toggleCapture(false)">Pause</button>
            <button onclick="engine.toggleCapture(true)">Resume</button>
            <button style="grid-column: span 2; background: rgba(0,242,255,0.15)" onclick="engine.exportCSV()">Export Session CSV</button>
            <button onclick="engine.clearTrail()">Purge Log</button>
            <button onclick="window.location.reload()">Reboot</button>
        </div>
    </div>
    <div id="telemetry-box" class="tactical-panel">
        LOGGED: <span id="val-count" class="val">0</span> pts<br>
        LAT: <span id="val-lat" class="val">---</span><br>
        LON: <span id="val-lon" class="val">---</span>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
class SentryEngine {
    constructor() {
        this.isCapturing = false;
        this.origin = null;
        this.scale = 650000; 
        this.zoom = 19;
        this.history = []; // CSV Data storage
        this.spheres = []; // 3D Plot storage
        
        this.initCore();
        this.initEntities();
        this.animate();
        this.toggleCapture(true);
    }

    initCore() {
        this.scene = new THREE.Scene();
        this.camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 35000);
        this.camera.position.set(0, 200, 0); 
        this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(this.renderer.domElement);
        this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
        this.controls.enableDamping = true;
        this.scene.add(new THREE.AmbientLight(0xffffff, 0.4));
    }

    initEntities() {
        this.avatar = new THREE.Mesh(
            new THREE.OctahedronGeometry(4, 0),
            new THREE.MeshPhongMaterial({ color: 0x000000, emissive: 0x00f2ff, emissiveIntensity: 2 })
        );
        this.scene.add(this.avatar);
        this.tilesGroup = new THREE.Group();
        this.scene.add(this.tilesGroup);
        
        // Sphere Geometry for plotted points
        this.sphereGeo = new THREE.SphereGeometry(1.2, 16, 16);
        this.sphereMat = new THREE.MeshBasicMaterial({ color: 0x00ffff });
    }

    handleGPS(pos) {
        const { latitude, longitude, accuracy } = pos.coords;
        if (!this.origin) {
            this.origin = { lat: latitude, lon: longitude };
            this.updateMap(latitude, longitude);
        }

        const tX = (longitude - this.origin.lon) * this.scale;
        const tZ = -(latitude - this.origin.lat) * this.scale;

        // Log Data for CSV
        this.history.push({
            time: new Date().toISOString(),
            lat: latitude,
            lon: longitude,
            acc: accuracy
        });

        // Plot Sphere
        const point = new THREE.Mesh(this.sphereGeo, this.sphereMat);
        point.position.set(tX, 0.5, tZ);
        this.scene.add(point);
        this.spheres.push(point);

        // Update UI
        document.getElementById('val-lat').innerText = latitude.toFixed(6);
        document.getElementById('val-lon').innerText = longitude.toFixed(6);
        document.getElementById('val-count').innerText = this.history.length;
        this.avatar.position.set(tX, 8, tZ);
    }

    exportCSV() {
        let csv = "Timestamp,Latitude,Longitude,Accuracy\n";
        this.history.forEach(row => {
            csv += `${row.time},${row.lat},${row.lon},${row.acc}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `Sentry_Log_${Date.now()}.csv`;
        a.click();
    }

    updateMap(lat, lon) {
        this.tilesGroup.clear();
        const xC = Math.floor((lon + 180) / 360 * Math.pow(2, this.zoom));
        const yC = Math.floor((1 - Math.log(Math.tan(lat * Math.PI / 180) + 1 / Math.cos(lat * Math.PI / 180)) / Math.PI) / 2 * Math.pow(2, this.zoom));
        const loader = new THREE.TextureLoader();
        for (let x = -1; x <= 1; x++) {
            for (let y = -1; y <= 1; y++) {
                const url = `https://tile.openstreetmap.org/${this.zoom}/${xC + x}/${yC + y}.png`;
                loader.load(url, (tex) => {
                    const plane = new THREE.Mesh(new THREE.PlaneGeometry(120, 120), new THREE.MeshBasicMaterial({ map: tex }));
                    plane.rotation.x = -Math.PI / 2;
                    plane.position.set(x * 120, -0.2, y * 120);
                    plane.onBeforeRender = () => { this.renderer.domElement.style.filter = "var(--map-filter)"; };
                    this.tilesGroup.add(plane);
                });
            }
        }
    }

    toggleCapture(state) {
        this.isCapturing = state;
        if (state) this.watchID = navigator.geolocation.watchPosition(p => this.handleGPS(p), null, { enableHighAccuracy: true });
        else navigator.geolocation.clearWatch(this.watchID);
    }

    clearTrail() {
        this.spheres.forEach(s => this.scene.remove(s));
        this.spheres = [];
        this.history = [];
        document.getElementById('val-count').innerText = "0";
    }

    animate() {
        requestAnimationFrame(() => this.animate());
        this.avatar.rotation.y += 0.02;
        this.controls.update();
        this.renderer.render(this.scene, this.camera);
    }
}
const engine = new SentryEngine();
</script>
</body>
</html>
