<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sentry Node | Blue Ops v7.5</title>
    <style>
        :root { 
            --neon-blue: #00f2ff; 
            --bg: #020202; 
            --map-filter: invert(100%) hue-rotate(90deg) brightness(0.4) sepia(1) saturate(6) hue-rotate(60deg);
        }
        body { margin: 0; overflow: hidden; background: var(--bg); font-family: 'Courier New', monospace; color: var(--neon-blue); }
        canvas { display: block; filter: contrast(1.2) brightness(1.1); }

        #ui-overlay { position: absolute; inset: 0; pointer-events: none; z-index: 100; }

        #main-panel {
            position: absolute; top: 20px; left: 20px; pointer-events: auto;
            background: rgba(0, 5, 10, 0.9); padding: 15px; border: 1px solid var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); width: 220px;
        }

        #status-header { font-size: 10px; border-bottom: 1px solid var(--neon-blue); padding-bottom: 8px; margin-bottom: 10px; letter-spacing: 2px; color: #fff; }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        button {
            background: transparent; color: var(--neon-blue); border: 1px solid var(--neon-blue);
            padding: 8px; cursor: pointer; text-transform: uppercase; font-size: 9px;
            font-weight: bold;
        }
        button:active { background: var(--neon-blue); color: #000; }

        #telemetry-box {
            position: absolute; top: 20px; right: 20px; font-size: 11px;
            background: rgba(0, 5, 10, 0.9); padding: 12px; border-right: 4px solid var(--neon-blue);
            text-align: right;
        }
        .val { color: #fff; font-weight: bold; }
    </style>
</head>
<body>

<div id="ui-overlay">
    <div id="main-panel">
        <div id="status-header">SENTRY NODE // MAP_MODE: <span style="color:var(--neon-blue)">BLUE_OPS</span></div>
        <div class="btn-grid">
            <button onclick="engine.toggleCapture(false)">Hold Link</button>
            <button onclick="engine.toggleCapture(true)">Resume</button>
            <button style="grid-column: span 2; background: rgba(0,242,255,0.15)" onclick="engine.reCenter()">Sync Tactical Top-View</button>
            <button onclick="engine.clearTrail()">Purge Path</button>
            <button onclick="window.location.reload()">Reboot</button>
        </div>
    </div>

    <div id="telemetry-box">
        SIGNAL: <span id="val-acc" class="val">UPLINKING...</span><br>
        LAT: <span id="val-lat" class="val">---</span><br>
        LON: <span id="val-lon" class="val">---</span>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
class SentryEngine {
    constructor() {
        this.isCapturing = false;
        this.origin = null;
        this.scale = 650000; 
        this.zoom = 19;
        this.pathPoints = [];
        
        this.initCore();
        this.initEntities();
        this.animate();
        
        // AUTO-START ON OPEN
        this.toggleCapture(true);
    }

    initCore() {
        this.scene = new THREE.Scene();
        this.camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 20000);
        // Force Top-Down Perspective
        this.camera.position.set(0, 150, 0); 

        this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(this.renderer.domElement);

        this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
        this.controls.enableDamping = true;

        this.scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        this.light = new THREE.PointLight(0x00f2ff, 2, 300);
        this.scene.add(this.light);
    }

    initEntities() {
        this.avatarGroup = new THREE.Group();
        this.scene.add(this.avatarGroup);

        // Core Solid - Neon Blue
        const coreGeo = new THREE.OctahedronGeometry(2.5, 0);
        const coreMat = new THREE.MeshPhongMaterial({ color: 0x000000, emissive: 0x00f2ff, emissiveIntensity: 0.8 });
        this.core = new THREE.Mesh(coreGeo, coreMat);
        this.avatarGroup.add(this.core);

        // Wireframe Diamond Shell
        const shellGeo = new THREE.OctahedronGeometry(3.1, 0);
        const shellMat = new THREE.MeshBasicMaterial({ color: 0x00f2ff, wireframe: true, transparent: true, opacity: 0.9 });
        this.shell = new THREE.Mesh(shellGeo, shellMat);
        this.avatarGroup.add(this.shell);

        // Map Tiles Group
        this.tilesGroup = new THREE.Group();
        this.scene.add(this.tilesGroup);

        // Movement Trail
        this.trailGeo = new THREE.BufferGeometry();
        this.trail = new THREE.Line(this.trailGeo, new THREE.LineBasicMaterial({ color: 0x00f2ff, transparent: true, opacity: 0.6 }));
        this.scene.add(this.trail);
    }

    updateMap(lat, lon) {
        this.tilesGroup.clear();
        const xC = Math.floor((lon + 180) / 360 * Math.pow(2, this.zoom));
        const yC = Math.floor((1 - Math.log(Math.tan(lat * Math.PI / 180) + 1 / Math.cos(lat * Math.PI / 180)) / Math.PI) / 2 * Math.pow(2, this.zoom));
        const loader = new THREE.TextureLoader();

        for (let x = -1; x <= 1; x++) {
            for (let y = -1; y <= 1; y++) {
                const url = `https://tile.openstreetmap.org/${this.zoom}/${xC + x}/${yC + y}.png`;
                loader.load(url, (tex) => {
                    const plane = new THREE.Mesh(new THREE.PlaneGeometry(120, 120), new THREE.MeshBasicMaterial({ map: tex }));
                    plane.rotation.x = -Math.PI / 2;
                    plane.position.set(x * 120, 0, y * 120);
                    plane.onBeforeRender = () => { this.renderer.domElement.style.filter = "var(--map-filter)"; };
                    this.tilesGroup.add(plane);
                });
            }
        }
    }

    toggleCapture(state) {
        if (state && !this.isCapturing) {
            this.isCapturing = true;
            this.watchID = navigator.geolocation.watchPosition(p => this.handleGPS(p), null, { enableHighAccuracy: true });
        } else if (!state) {
            this.isCapturing = false;
            navigator.geolocation.clearWatch(this.watchID);
        }
    }

    handleGPS(pos) {
        const { latitude, longitude, accuracy } = pos.coords;

        if (!this.origin) {
            this.origin = { lat: latitude, lon: longitude };
            this.updateMap(latitude, longitude);
            this.reCenter(); // Lock Top-View on initial fix
        }

        document.getElementById('val-lat').innerText = latitude.toFixed(5);
        document.getElementById('val-lon').innerText = longitude.toFixed(5);
        document.getElementById('val-acc').innerText = accuracy.toFixed(1) + "m";
        
        const tX = (longitude - this.origin.lon) * this.scale;
        const tZ = -(latitude - this.origin.lat) * this.scale;

        this.pathPoints.push(new THREE.Vector3(tX, 0.2, tZ));
        this.trailGeo.setFromPoints(this.pathPoints);
        this.avatarGroup.userData.dest = new THREE.Vector3(tX, 5, tZ);
    }

    reCenter() {
        // Enforce top-down tactical perspective
        const height = 150;
        this.camera.position.set(this.avatarGroup.position.x, height, this.avatarGroup.position.z);
        this.controls.target.copy(this.avatarGroup.position);
    }

    clearTrail() { this.pathPoints = []; this.trailGeo.setFromPoints([]); }

    animate() {
        requestAnimationFrame(() => this.animate());
        if (this.avatarGroup.userData.dest) {
            this.avatarGroup.position.lerp(this.avatarGroup.userData.dest, 0.05);
        }

        // Blue Core Rotations
        this.core.rotation.y += 0.03;
        this.shell.rotation.x += 0.02;
        this.shell.rotation.z += 0.02;

        this.light.position.set(this.avatarGroup.position.x, 15, this.avatarGroup.position.z);
        this.controls.update();
        this.renderer.render(this.scene, this.camera);
    }
}
const engine = new SentryEngine();
</script>
</body>
</html>
