<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentry Node | Tactical Map v4</title>
    <style>
        :root { --neon: #00ff41; --bg: #050505; }
        body { margin: 0; overflow: hidden; background: var(--bg); font-family: 'Courier New', monospace; color: var(--neon); }
        
        #ui-panel {
            position: absolute; top: 15px; left: 15px; z-index: 100;
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px;
            background: rgba(0, 20, 0, 0.95); padding: 12px; 
            border: 1px solid var(--neon); box-shadow: 0 0 20px rgba(0, 255, 65, 0.3);
        }

        #status-bar { grid-column: span 2; font-size: 10px; border-bottom: 1px solid var(--neon); padding-bottom: 6px; margin-bottom: 6px; text-transform: uppercase; }

        button {
            background: transparent; color: var(--neon); border: 1px solid var(--neon);
            padding: 10px; cursor: pointer; text-transform: uppercase; font-size: 10px;
            transition: all 0.2s; font-weight: bold;
        }

        button:active { background: var(--neon); color: #000; }

        #data-readout {
            position: absolute; top: 15px; right: 15px; font-size: 11px;
            background: rgba(0,0,0,0.8); padding: 10px; border-left: 2px solid var(--neon);
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="ui-panel">
    <div id="status-bar">SYSTEM STATUS: NAV_SURVEILLANCE_ACTIVE</div>
    <button onclick="engine.toggleCapture(true)">Start</button>
    <button onclick="engine.toggleCapture(false)">Pause</button>
    <button onclick="engine.stop()">Stop</button>
    <button onclick="engine.export()">Export</button>
    <button onclick="engine.clear()">Clear</button>
    <button onclick="engine.reCenter()" style="background: var(--neon); color: #000;">Re-Center (45°)</button>
</div>

<div id="data-readout">
    LAT: <span id="val-lat">0.0000</span><br>
    LON: <span id="val-lon">0.0000</span><br>
    ALT: <span id="val-alt">0.0m</span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
class SentryEngine {
    constructor() {
        this.data = [];
        this.isCapturing = false;
        this.watchID = null;
        this.origin = null;
        this.scale = 250000; 
        this.zoomLevel = 18; 
        this.tileSize = 60; 
        
        this.initScene();
        this.initObjects();
        this.animate();
    }

    initScene() {
        this.scene = new THREE.Scene();
        this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 5000);
        this.camera.position.set(0, 80, 80);
        
        this.renderer = new THREE.WebGLRenderer({ antialias: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.setClearColor(0x050505);
        document.body.appendChild(this.renderer.domElement);

        // OrbitControls for Pan, Tilt, and Zoom
        this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
        this.controls.enableDamping = true;
        this.controls.dampingFactor = 0.05;
        this.controls.screenSpacePanning = false;

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        this.scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0x00ff41, 1, 200);
        pointLight.position.set(0, 50, 0);
        this.scene.add(pointLight);
    }

    initObjects() {
        // Pointing Down Triangle (Cone inverted)
        const geometry = new THREE.ConeGeometry(1.2, 2.5, 4);
        const material = new THREE.MeshPhongMaterial({ 
            color: 0x002200, 
            emissive: 0x00ff41,
            flatShading: true 
        });
        this.avatar = new THREE.Mesh(geometry, material);
        // Rotate 180 degrees on X to point the tip DOWN
        this.avatar.rotation.x = Math.PI; 
        this.scene.add(this.avatar);

        // Pulse Ring
        const ringGeo = new THREE.RingGeometry(1.5, 1.8, 32);
        const ringMat = new THREE.MeshBasicMaterial({ color: 0x00ff41, transparent: true, side: THREE.DoubleSide });
        this.ring = new THREE.Mesh(ringGeo, ringMat);
        this.ring.rotation.x = -Math.PI / 2;
        this.scene.add(this.ring);

        // 3x3 Tile Floor (Leaflet Textures)
        this.tilesGroup = new THREE.Group();
        this.scene.add(this.tilesGroup);
    }

    lon2tile(lon, zoom) { return Math.floor((lon + 180) / 360 * Math.pow(2, zoom)); }
    lat2tile(lat, zoom) {
        return Math.floor((1 - Math.log(Math.tan(lat * Math.PI / 180) + 1 / Math.cos(lat * Math.PI / 180)) / Math.PI) / 2 * Math.pow(2, zoom));
    }

    updateMapTiles(lat, lon) {
        this.tilesGroup.clear();
        const xCenter = this.lon2tile(lon, this.zoomLevel);
        const yCenter = this.lat2tile(lat, this.zoomLevel);
        const loader = new THREE.TextureLoader();

        for (let xOff = -1; xOff <= 1; xOff++) {
            for (let yOff = -1; yOff <= 1; yOff++) {
                const x = xCenter + xOff;
                const y = yCenter + yOff;
                const url = `https://tile.openstreetmap.org/${this.zoomLevel}/${x}/${y}.png`;
                
                loader.load(url, (texture) => {
                    const planeMat = new THREE.MeshBasicMaterial({ map: texture });
                    const plane = new THREE.Mesh(new THREE.PlaneGeometry(this.tileSize, this.tileSize), planeMat);
                    plane.rotation.x = -Math.PI / 2;
                    plane.position.set(xOff * this.tileSize, 0, yOff * this.tileSize);
                    this.tilesGroup.add(plane);
                });
            }
        }
    }

    toggleCapture(state) {
        if (state && !this.watchID) {
            this.isCapturing = true;
            this.updateStatus("UPLINK_ACTIVE");
            this.watchID = navigator.geolocation.watchPosition((pos) => this.handleGPS(pos), null, { enableHighAccuracy: true });
        } else {
            this.isCapturing = false;
            this.updateStatus("UPLINK_PAUSED");
        }
    }

    handleGPS(position) {
        if (!this.isCapturing) return;
        const { latitude, longitude, altitude } = position.coords;
        
        if (!this.origin) {
            this.origin = { lat: latitude, lon: longitude };
            this.updateMapTiles(latitude, longitude);
        }

        document.getElementById('val-lat').innerText = latitude.toFixed(6);
        document.getElementById('val-lon').innerText = longitude.toFixed(6);
        document.getElementById('val-alt').innerText = (altitude || 0).toFixed(1) + "m";

        const xPos = (longitude - this.origin.lon) * this.scale;
        const zPos = -(latitude - this.origin.lat) * this.scale;
        
        // Target position for smooth follow
        this.avatar.position.set(xPos, 4, zPos);
    }

    reCenter() {
        // Force camera to 45 degree tactical view
        this.camera.position.set(this.avatar.position.x + 60, 60, this.avatar.position.z + 60);
        this.controls.target.copy(this.avatar.position);
        this.controls.update();
    }

    updateStatus(msg) { document.getElementById('status-bar').innerText = `SYSTEM STATUS: ${msg}`; }

    animate() {
        requestAnimationFrame(() => this.animate());
        const time = performance.now() * 0.001;

        // Animate solid avatar hovering
        this.avatar.position.y = 5 + Math.sin(time * 3) * 0.5;
        this.avatar.rotation.y += 0.02;

        // Pulse Ring
        let pulse = (performance.now() % 400) / 400;
        this.ring.scale.set(1.5 + pulse * 2.5, 1.5 + pulse * 2.5, 1);
        this.ring.material.opacity = 1 - pulse;
        this.ring.position.set(this.avatar.position.x, 0.2, this.avatar.position.z);

        this.controls.update();
        this.renderer.render(this.scene, this.camera);
    }
}

const engine = new SentryEngine();
window.addEventListener('resize', () => {
    engine.camera.aspect = window.innerWidth / window.innerHeight;
    engine.camera.updateProjectionMatrix();
    engine.renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
