<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sentry Node | BLUE_OPS v24.0</title>
    <style>
        :root { 
            --accent: #ffaa00; 
            --packet: #00ff66;
            --bg: #000c0f; 
            --panel-bg: rgba(0, 10, 15, 0.95);
        }
        body { margin: 0; overflow: hidden; background: var(--bg); font-family: 'Segoe UI', sans-serif; color: var(--accent); }
        #ui-overlay { position: absolute; inset: 0; pointer-events: none; z-index: 100; display: flex; flex-direction: column; justify-content: space-between; padding: 15px; }
        .tactical-panel {
            pointer-events: auto; background: var(--panel-bg); 
            border: 1px solid rgba(255, 170, 0, 0.3); 
            backdrop-filter: blur(10px); padding: 12px; border-radius: 4px;
        }
        .top-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
        #status-header { font-size: 11px; font-weight: 900; letter-spacing: 2px; border-left: 3px solid var(--accent); padding-left: 8px; margin-bottom: 12px; }
        #terminal { font-size: 9px; height: 60px; overflow-y: hidden; color: rgba(255, 170, 0, 0.7); margin-top: 10px; border-top: 1px solid rgba(255, 170, 0, 0.2); padding-top: 5px; font-family: monospace; }
        .telemetry-item { margin-bottom: 4px; font-size: 10px; display: flex; justify-content: space-between; width: 170px; }
        .val { color: #fff; font-family: 'Courier New', monospace; font-weight: bold; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        button {
            background: rgba(255, 170, 0, 0.05); color: var(--accent); border: 1px solid rgba(255, 170, 0, 0.4);
            padding: 8px; cursor: pointer; text-transform: uppercase; font-size: 9px; font-weight: bold;
            clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%);
        }
    </style>
</head>
<body>

<div id="ui-overlay">
    <div class="top-row">
        <div class="tactical-panel" style="max-width: 250px;">
            <div id="status-header">SENTRY // PRECISION_SYNC_v24</div>
            <div class="btn-grid">
                <button onclick="engine.toggleCapture(true)">Connect</button>
                <button onclick="engine.toggleCapture(false)">Disconnect</button>
                <button style="grid-column: span 2;" onclick="engine.exportCSV()">Download .CSV</button>
                <button onclick="engine.reCenter()">Sync View</button>
                <button onclick="engine.clearTrail()" style="color: #ff3333;">Purge</button>
            </div>
            <div id="terminal">> Awaiting High-Precision Fix...</div>
        </div>
        <div class="tactical-panel">
            <div class="telemetry-item">PACKETS: <span id="val-count" class="val">0</span></div>
            <div class="telemetry-item">LAT: <span id="val-lat" class="val">0.000000</span></div>
            <div class="telemetry-item">LON: <span id="val-lon" class="val">0.000000</span></div>
            <div class="telemetry-item">PRECISION: <span id="val-acc" class="val">0</span>m</div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
class SentryEngine {
    constructor() {
        this.isCapturing = false;
        this.origin = null;
        this.zoom = 19;
        this.tileSize = 512; // Standard Mercator tile size
        this.worldScale = 1; // Direct 1:1 pixel mapping
        this.history = [];
        this.spheres = [];
        this.lastPosition = null;
        
        this.initCore();
        this.initEntities();
        this.animate();
    }

    // --- MATHEMATICAL CORE: WEB MERCATOR PROJECTION ---
    latToY(lat, zoom) {
        const rad = lat * Math.PI / 180;
        return (1 - Math.log(Math.tan(rad) + 1 / Math.cos(rad)) / Math.PI) / 2 * Math.pow(2, zoom);
    }
    lonToX(lon, zoom) {
        return (lon + 180) / 360 * Math.pow(2, zoom);
    }

    initCore() {
        this.scene = new THREE.Scene();
        this.scene.fog = new THREE.FogExp2(0x000c0f, 0.0008);
        this.camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 100000);
        this.camera.position.set(0, 600, 450);

        this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        this.renderer.setPixelRatio(window.devicePixelRatio);
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(this.renderer.domElement);

        this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
        this.controls.enableDamping = true;

        this.scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        this.amberLight = new THREE.PointLight(0xffaa00, 15, 1000);
        this.scene.add(this.amberLight);
        
        const grid = new THREE.GridHelper(5000, 50, 0xffaa00, 0x221100);
        grid.material.opacity = 0.1;
        grid.material.transparent = true;
        this.scene.add(grid);
    }

    initEntities() {
        this.core = new THREE.Mesh(
            new THREE.OctahedronGeometry(12, 0),
            new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: 0xffaa00, emissiveIntensity: 1.5, metalness: 1, roughness: 0 })
        );
        this.scene.add(this.core);
        this.tilesGroup = new THREE.Group();
        this.scene.add(this.tilesGroup);
    }

    handleGPS(pos) {
        this.lastPosition = pos;
        const { latitude, longitude, accuracy } = pos.coords;

        if (!this.origin) {
            // Origin is now a precise Mercator tile coordinate
            this.origin = {
                x: this.lonToX(longitude, this.zoom),
                y: this.latToY(latitude, this.zoom),
                lat: latitude,
                lon: longitude
            };
            this.updateMap(latitude, longitude);
            document.getElementById('terminal').innerText = "> Geo-Projection Active.";
        }

        // Calculate Sub-Pixel Offset within the Mercator grid
        const currentX = this.lonToX(longitude, this.zoom);
        const currentY = this.latToY(latitude, this.zoom);

        // Map units: difference in Mercator fractional coordinates * tile size
        const tX = (currentX - this.origin.x) * this.tileSize;
        const tZ = (currentY - this.origin.y) * this.tileSize;

        this.core.position.set(tX, 40, tZ);
        this.amberLight.position.set(tX, 80, tZ);

        document.getElementById('val-lat').innerText = latitude.toFixed(6);
        document.getElementById('val-lon').innerText = longitude.toFixed(6);
        document.getElementById('val-acc').innerText = Math.round(accuracy);
    }

    dropPacket() {
        if(!this.lastPosition || !this.isCapturing) return;
        const { latitude, longitude } = this.lastPosition.coords;
        
        const pX = (this.lonToX(longitude, this.zoom) - this.origin.x) * this.tileSize;
        const pZ = (this.latToY(latitude, this.zoom) - this.origin.y) * this.tileSize;

        this.history.push({ lat: latitude, lon: longitude, time: new Date().toLocaleTimeString() });

        const packet = new THREE.Mesh(
            new THREE.BoxGeometry(6, 6, 6),
            new THREE.MeshStandardMaterial({ color: 0x00ff66, emissive: 0x00ff66, emissiveIntensity: 2 })
        );
        packet.position.set(pX, 3, pZ);
        this.scene.add(packet);
        this.spheres.push(packet);
        document.getElementById('val-count').innerText = this.history.length;
    }

    updateMap(lat, lon) {
        this.tilesGroup.clear();
        const xC = Math.floor(this.lonToX(lon, this.zoom));
        const yC = Math.floor(this.latToY(lat, this.zoom));
        
        const loader = new THREE.TextureLoader();
        // 3x3 Grid of Tiles
        for (let x = -1; x <= 1; x++) {
            for (let y = -1; y <= 1; y++) {
                const url = `https://tile.openstreetmap.org/${this.zoom}/${xC + x}/${yC + y}.png`;
                loader.load(url, (tex) => {
                    const mat = new THREE.MeshStandardMaterial({ map: tex, color: 0x004455 });
                    const plane = new THREE.Mesh(new THREE.PlaneGeometry(this.tileSize, this.tileSize), mat);
                    plane.rotation.x = -Math.PI / 2;
                    
                    // The tile's center in Mercator fractional coordinates
                    const tileCenterX = (xC + x) + 0.5;
                    const tileCenterY = (yC + y) + 0.5;
                    
                    // Position relative to our current origin
                    const offX = (tileCenterX - this.origin.x) * this.tileSize;
                    const offZ = (tileCenterY - this.origin.y) * this.tileSize;
                    
                    plane.position.set(offX, 0, offZ);
                    this.tilesGroup.add(plane);
                });
            }
        }
    }

    toggleCapture(state) {
        if(state && !this.isCapturing) {
            this.watchID = navigator.geolocation.watchPosition(p => this.handleGPS(p), null, { enableHighAccuracy: true });
            this.logTimer = setInterval(() => this.dropPacket(), 1000);
            document.getElementById('terminal').innerText = "> 1Hz Sync Engaged.";
        } else {
            navigator.geolocation.clearWatch(this.watchID);
            clearInterval(this.logTimer);
            document.getElementById('terminal').innerText = "> Sync Suspended.";
        }
        this.isCapturing = state;
    }

    reCenter() { 
        if(this.core) this.controls.target.copy(this.core.position); 
    }
    
    clearTrail() {
        this.spheres.forEach(s => this.scene.remove(s));
        this.spheres = [];
        this.history = [];
        document.getElementById('val-count').innerText = "0";
    }

    animate() {
        requestAnimationFrame(() => this.animate());
        const time = Date.now() * 0.002;
        this.core.rotation.y += 0.05;
        this.core.position.y = 40 + Math.sin(time) * 5;
        this.controls.update();
        this.renderer.render(this.scene, this.camera);
    }
}
const engine = new SentryEngine();
</script>
</body>
</html>
