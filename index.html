<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sentry Node | BLUE_OPS v17.0</title>
    <style>
        :root { 
            --neon-blue: #00f2ff; 
            --highlighter: #00ffff;
            --bg: #00080a; 
            --map-filter: invert(100%) hue-rotate(95deg) brightness(0.6) contrast(1.2) saturate(4);
        }
        body { margin: 0; overflow: hidden; background: var(--bg); font-family: 'Courier New', monospace; color: var(--neon-blue); }
        
        #ui-overlay { position: absolute; inset: 0; pointer-events: none; z-index: 100; }
        .tactical-panel {
            pointer-events: auto; background: rgba(0, 20, 30, 0.95); 
            border: 1px solid var(--neon-blue); box-shadow: 0 0 30px rgba(0, 242, 255, 0.6);
            backdrop-filter: blur(10px);
        }
        #main-panel { position: absolute; top: 20px; left: 20px; width: 250px; padding: 15px; border-left: 5px solid var(--highlighter); }
        #status-header { font-size: 11px; font-weight: bold; border-bottom: 1px solid rgba(0, 242, 255, 0.5); padding-bottom: 10px; margin-bottom: 12px; letter-spacing: 2px; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        button {
            background: rgba(0, 242, 255, 0.2); color: var(--highlighter); border: 1px solid var(--highlighter);
            padding: 10px; cursor: pointer; text-transform: uppercase; font-size: 9px; font-weight: 900;
        }
        button:active { background: var(--highlighter); color: #000; }
        #telemetry-box { position: absolute; top: 20px; right: 20px; padding: 15px; border-right: 5px solid var(--highlighter); text-align: right; font-size: 11px; }
        .val { color: #fff; font-weight: bold; text-shadow: 0 0 10px var(--neon-blue); }
    </style>
</head>
<body>

<div id="ui-overlay">
    <div id="main-panel" class="tactical-panel">
        <div id="status-header">SENTRY // VISIBILITY_RESTORE_v17</div>
        <div class="btn-grid">
            <button onclick="engine.toggleCapture(false)">Pause</button>
            <button onclick="engine.toggleCapture(true)">Resume</button>
            <button style="grid-column: span 2; background: rgba(0,242,255,0.3)" onclick="engine.exportCSV()">Export Session CSV</button>
            <button onclick="engine.clearTrail()">Purge Log</button>
            <button onclick="engine.reCenter()">Re-Center</button>
        </div>
    </div>
    <div id="telemetry-box" class="tactical-panel">
        LOGGED: <span id="val-count" class="val">0</span> pts<br>
        LAT: <span id="val-lat" class="val">---</span><br>
        LON: <span id="val-lon" class="val">---</span>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
class SentryEngine {
    constructor() {
        this.isCapturing = false;
        this.origin = null;
        this.scale = 650000; 
        this.zoom = 19;
        this.history = [];
        this.spheres = [];
        
        this.initCore();
        this.initEntities();
        this.animate();
        this.toggleCapture(true);
    }

    initCore() {
        this.scene = new THREE.Scene();
        this.camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 60000);
        this.camera.position.set(0, 400, 0); 

        this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        this.renderer.setPixelRatio(window.devicePixelRatio);
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(this.renderer.domElement);

        this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
        this.controls.enableDamping = true;

        // VISIBILITY RESET: LIGHTING
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x002233, 1.5);
        this.scene.add(hemiLight);

        this.trackingLight = new THREE.PointLight(0x00f2ff, 12, 1000);
        this.scene.add(this.trackingLight);
    }

    initEntities() {
        // VISIBILITY RESET: DIAMOND
        const diamondGeo = new THREE.OctahedronGeometry(7, 0);
        this.diamondMat = new THREE.MeshStandardMaterial({ 
            color: 0x000000, 
            emissive: 0x00f2ff, 
            emissiveIntensity: 5,
            visible: true 
        });
        this.diamond = new THREE.Mesh(diamondGeo, this.diamondMat);
        this.scene.add(this.diamond);

        this.tilesGroup = new THREE.Group();
        this.scene.add(this.tilesGroup);
        
        // VISIBILITY RESET: SPHERES
        this.sphereGeo = new THREE.SphereGeometry(3, 16, 16);
        this.sphereMat = new THREE.MeshStandardMaterial({ 
            color: 0x00ffff, 
            emissive: 0x00ffff, 
            emissiveIntensity: 3,
            visible: true
        });
    }

    handleGPS(pos) {
        const { latitude, longitude, accuracy } = pos.coords;
        if (!this.origin) {
            this.origin = { lat: latitude, lon: longitude };
            this.updateMap(latitude, longitude);
        }

        const tX = (longitude - this.origin.lon) * this.scale;
        const tZ = -(latitude - this.origin.lat) * this.scale;

        this.history.push({ time: new Date().toISOString(), lat: latitude, lon: longitude, acc: accuracy });

        // CREATE VISIBLE PLOT POINT
        const point = new THREE.Mesh(this.sphereGeo, this.sphereMat);
        point.position.set(tX, 2, tZ);
        point.visible = true; // Visibility Lock
        this.scene.add(point);
        this.spheres.push(point);

        document.getElementById('val-lat').innerText = latitude.toFixed(6);
        document.getElementById('val-lon').innerText = longitude.toFixed(6);
        document.getElementById('val-count').innerText = this.history.length;
        
        this.diamond.position.set(tX, 20, tZ);
        this.trackingLight.position.set(tX, 40, tZ);
    }

    updateMap(lat, lon) {
        this.tilesGroup.clear();
        const xC = Math.floor((lon + 180) / 360 * Math.pow(2, this.zoom));
        const yC = Math.floor((1 - Math.log(Math.tan(lat * Math.PI / 180) + 1 / Math.cos(lat * Math.PI / 180)) / Math.PI) / 2 * Math.pow(2, this.zoom));
        const loader = new THREE.TextureLoader();

        for (let x = -2; x <= 2; x++) {
            for (let y = -2; y <= 2; y++) {
                const url = `https://tile.openstreetmap.org/${this.zoom}/${xC + x}/${yC + y}.png`;
                loader.load(url, (tex) => {
                    const plane = new THREE.Mesh(new THREE.PlaneGeometry(120, 120), new THREE.MeshStandardMaterial({ map: tex, visible: true }));
                    plane.rotation.x = -Math.PI / 2;
                    plane.position.set(x * 120, -5, y * 120); 
                    plane.onBeforeRender = () => { this.renderer.domElement.style.filter = "var(--map-filter)"; };
                    this.tilesGroup.add(plane);
                });
            }
        }
    }

    reCenter() {
        this.camera.position.set(this.diamond.position.x, 400, this.diamond.position.z);
        this.controls.target.copy(this.diamond.position);
    }

    exportCSV() {
        let csv = "Timestamp,Latitude,Longitude,Accuracy\n";
        this.history.forEach(r => csv += `${r.time},${r.lat},${r.lon},${r.acc}\n`);
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `Sentry_Visibility_Log_${Date.now()}.csv`;
        a.click();
    }

    toggleCapture(state) {
        this.isCapturing = state;
        if (state) this.watchID = navigator.geolocation.watchPosition(p => this.handleGPS(p), null, { enableHighAccuracy: true });
        else navigator.geolocation.clearWatch(this.watchID);
    }

    clearTrail() {
        this.spheres.forEach(s => this.scene.remove(s));
        this.spheres = [];
        this.history = [];
        document.getElementById('val-count').innerText = "0";
    }

    animate() {
        requestAnimationFrame(() => this.animate());
        this.diamond.rotation.y += 0.06;
        this.controls.update();
        this.renderer.render(this.scene, this.camera);
    }
}
const engine = new SentryEngine();
</script>
</body>
</html>
