<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sentry Node | NCH Advanced Core</title>
    <style>
        :root { 
            --neon: #00ff41; 
            --warning: #ff3e3e;
            --bg: #020202; 
            --panel-bg: rgba(0, 10, 0, 0.9);
            --map-green: invert(100%) hue-rotate(90deg) brightness(0.4) sepia(1) saturate(6) hue-rotate(60deg);
        }
        body { margin: 0; overflow: hidden; background: var(--bg); font-family: 'Courier New', monospace; color: var(--neon); user-select: none; }
        
        /* Apply Tactical Green Filter to Leaflet Tiles */
        canvas { display: block; filter: contrast(1.1); }
        .leaflet-tile-container { filter: var(--map-green); }

        #ui-overlay { position: absolute; inset: 0; pointer-events: none; z-index: 100; border: 1px solid rgba(0, 255, 65, 0.1); }

        #main-panel {
            position: absolute; top: 20px; left: 20px; pointer-events: auto;
            background: var(--panel-bg); padding: 15px; border: 1px solid var(--neon);
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.15); width: 220px;
        }

        #status-header { font-size: 10px; border-bottom: 1px solid var(--neon); padding-bottom: 8px; margin-bottom: 10px; letter-spacing: 2px; }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        button {
            background: transparent; color: var(--neon); border: 1px solid var(--neon);
            padding: 8px; cursor: pointer; text-transform: uppercase; font-size: 9px;
            font-weight: bold; transition: 0.2s;
        }
        button:active { background: var(--neon); color: #000; }
        .full-btn { grid-column: span 2; background: rgba(0, 255, 65, 0.1); }

        #telemetry-box {
            position: absolute; top: 20px; right: 20px; font-size: 11px;
            background: var(--panel-bg); padding: 12px; border-right: 4px solid var(--neon);
            text-align: right; pointer-events: auto;
        }
        .data-bit { display: block; margin-bottom: 4px; }
        .val { font-weight: bold; color: #fff; }
    </style>
</head>
<body>

<div id="ui-overlay">
    <div id="main-panel">
        <div id="status-header">SYSTEM // SENTRY_NODE_v6.2</div>
        <div class="btn-grid">
            <button onclick="engine.toggleCapture(true)">Connect</button>
            <button onclick="engine.toggleCapture(false)">Hold</button>
            <button class="full-btn" onclick="engine.reCenter()">Sync Tactical 45°</button>
            <button onclick="engine.clearTrail()">Purge Path</button>
            <button onclick="window.location.reload()">Reboot</button>
        </div>
    </div>

    <div id="telemetry-box">
        <span class="data-bit">SIGNAL: <span id="val-acc" class="val">OFFLINE</span></span>
        <span class="data-bit">LAT: <span id="val-lat" class="val">0.0000</span></span>
        <span class="data-bit">LON: <span id="val-lon" class="val">0.0000</span></span>
        <span class="data-bit">SYNC: <span id="val-sync" class="val">LOCAL</span></span>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
class SentryEngine {
    constructor() {
        this.isCapturing = false;
        this.origin = null;
        this.scale = 650000; 
        this.zoom = 19;
        this.pathPoints = [];
        this.currentAcc = 100;
        
        this.initCore();
        this.initEntities();
        this.animate();
    }

    initCore() {
        this.scene = new THREE.Scene();
        this.camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.5, 15000);
        this.camera.position.set(100, 100, 100);

        this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(this.renderer.domElement);

        this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
        this.controls.enableDamping = true;
        this.controls.dampingFactor = 0.05;

        this.scene.add(new THREE.AmbientLight(0x404040, 1));
        this.spot = new THREE.PointLight(0x00ff41, 3, 250);
        this.scene.add(this.spot);
    }

    initEntities() {
        // CORE DIAMOND 
        const coreGeo = new THREE.OctahedronGeometry(2.5, 0);
        const coreMat = new THREE.MeshPhongMaterial({ color: 0x000000, emissive: 0x00ff41, emissiveIntensity: 1 });
        this.avatar = new THREE.Mesh(coreGeo, coreMat);
        this.scene.add(this.avatar);

        // DATA SPHERE - ADAPTIVE WIREFRAME
        const sphereGeo = new THREE.IcosahedronGeometry(5, 1);
        this.sphereMat = new THREE.MeshBasicMaterial({ color: 0x00ff41, wireframe: true, transparent: true, opacity: 0.2 });
        this.sphere = new THREE.Mesh(sphereGeo, this.sphereMat);
        this.avatar.add(this.sphere);

        // TACTICAL PULSE RING
        const ringGeo = new THREE.RingGeometry(3.5, 4, 4); // Square-ish diamond ring
        this.ringMat = new THREE.MeshBasicMaterial({ color: 0x00ff41, transparent: true, side: THREE.DoubleSide });
        this.ring = new THREE.Mesh(ringGeo, this.ringMat);
        this.ring.rotation.x = -Math.PI / 2;
        this.scene.add(this.ring);

        // BREADCRUMB TRAIL
        this.trailGeo = new THREE.BufferGeometry();
        this.trail = new THREE.Line(this.trailGeo, new THREE.LineBasicMaterial({ color: 0x00ff41, opacity: 0.5, transparent: true }));
        this.scene.add(this.trail);

        this.tilesGroup = new THREE.Group();
        this.scene.add(this.tilesGroup);
    }

    updateMap(lat, lon) {
        this.tilesGroup.clear();
        const xC = Math.floor((lon + 180) / 360 * Math.pow(2, this.zoom));
        const yC = Math.floor((1 - Math.log(Math.tan(lat * Math.PI / 180) + 1 / Math.cos(lat * Math.PI / 180)) / Math.PI) / 2 * Math.pow(2, this.zoom));
        const loader = new THREE.TextureLoader();

        for (let x = -1; x <= 1; x++) {
            for (let y = -1; y <= 1; y++) {
                const url = `https://tile.openstreetmap.org/${this.zoom}/${xC + x}/${yC + y}/.png`;
                loader.load(url, (tex) => {
                    const plane = new THREE.Mesh(
                        new THREE.PlaneGeometry(120, 120),
                        new THREE.MeshBasicMaterial({ map: tex, transparent: true, opacity: 0.9 })
                    );
                    plane.rotation.x = -Math.PI / 2;
                    plane.position.set(x * 120, 0, y * 120);
                    this.tilesGroup.add(plane);
                });
            }
        }
    }

    toggleCapture(state) {
        this.isCapturing = state;
        if (state) {
            this.watchID = navigator.geolocation.watchPosition(p => this.handleGPS(p), null, { enableHighAccuracy: true });
        } else {
            navigator.geolocation.clearWatch(this.watchID);
        }
    }

    handleGPS(pos) {
        const { latitude, longitude, accuracy } = pos.coords;
        this.currentAcc = accuracy;

        if (!this.origin) {
            this.origin = { lat: latitude, lon: longitude };
            this.updateMap(latitude, longitude);
            this.reCenter();
        }

        // Logical Update: Visual Telemetry
        document.getElementById('val-lat').innerText = latitude.toFixed(5);
        document.getElementById('val-lon').innerText = longitude.toFixed(5);
        document.getElementById('val-acc').innerText = accuracy.toFixed(1) + "m";
        
        const tX = (longitude - this.origin.lon) * this.scale;
        const tZ = -(latitude - this.origin.lat) * this.scale;

        // Path Update
        this.pathPoints.push(new THREE.Vector3(tX, 0.2, tZ));
        if (this.pathPoints.length > 200) this.pathPoints.shift();
        this.trailGeo.setFromPoints(this.pathPoints);

        this.avatar.userData.dest = new THREE.Vector3(tX, 6, tZ);
    }

    reCenter() {
        if (!this.avatar) return;
        const offset = 80;
        this.camera.position.set(this.avatar.position.x + offset, offset, this.avatar.position.z + offset);
        this.controls.target.copy(this.avatar.position);
    }

    clearTrail() { this.pathPoints = []; this.trailGeo.setFromPoints([]); }

    animate() {
        requestAnimationFrame(() => this.animate());
        const time = performance.now() * 0.001;

        if (this.avatar.userData.dest) {
            this.avatar.position.lerp(this.avatar.userData.dest, 0.06);
        }

        // Advanced Entity Logic: Accuracy Coloring
        if (this.currentAcc > 15) {
            this.sphereMat.color.setHex(0xff3e3e); // Red Warning
            document.getElementById('val-acc').style.color = 'var(--warning)';
        } else {
            this.sphereMat.color.setHex(0x00ff41); // Green Stable
            document.getElementById('val-acc').style.color = 'var(--neon)';
        }

        // Visual Flux
        this.avatar.rotation.y += 0.03;
        this.sphere.rotation.x += 0.01;
        this.sphere.rotation.z += 0.01;
        this.sphere.scale.setScalar(1 + Math.sin(time * 3) * 0.05 + (this.currentAcc / 40));

        let p = (performance.now() % 1200) / 1200;
        this.ring.scale.setScalar(1.5 + p * 3);
        this.ringMat.opacity = 1 - p;
        this.ring.position.set(this.avatar.position.x, 0.5, this.avatar.position.z);
        
        this.spot.position.set(this.avatar.position.x, 15, this.avatar.position.z);

        this.controls.update();
        this.renderer.render(this.scene, this.camera);
    }
}
const engine = new SentryEngine();
window.addEventListener('resize', () => {
    engine.camera.aspect = window.innerWidth / window.innerHeight;
    engine.camera.updateProjectionMatrix();
    engine.renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
