<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sentry Node | BLUE_OPS v26.0</title>
    <style>
        :root { 
            --accent: #ff9d00; 
            --packet: #00ff66;
            --bg: #00080a; 
            --panel-bg: rgba(2, 4, 6, 0.98);
            --border: rgba(255, 157, 0, 0.25);
        }
        body { margin: 0; overflow: hidden; background: var(--bg); font-family: 'Inter', sans-serif; color: var(--accent); }
        #ui-overlay { position: absolute; inset: 0; pointer-events: none; z-index: 100; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; }
        
        .tactical-panel {
            pointer-events: auto; background: var(--panel-bg); 
            border: 1px solid var(--border); 
            box-shadow: 0 10px 40px rgba(0,0,0,1);
            backdrop-filter: blur(15px); padding: 15px; border-radius: 2px;
        }

        #status-header { font-size: 10px; font-weight: 900; letter-spacing: 3px; border-left: 2px solid var(--accent); padding-left: 10px; margin-bottom: 15px; }
        #terminal { font-size: 9px; height: 45px; overflow: hidden; color: #555; margin-top: 10px; font-family: 'Courier New', monospace; }
        
        .telemetry-item { margin-bottom: 8px; font-size: 11px; display: flex; justify-content: space-between; width: 190px; color: #777; border-bottom: 1px solid rgba(255,255,255,0.03); padding-bottom: 2px; }
        .val { color: #eee; font-family: 'Courier New', monospace; font-weight: bold; }
        
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        button {
            background: rgba(255, 157, 0, 0.03); color: var(--accent); border: 1px solid var(--border);
            padding: 12px; cursor: pointer; text-transform: uppercase; font-size: 9px; font-weight: 900; transition: 0.3s;
        }
        button:hover { background: var(--accent); color: #000; }
    </style>
</head>
<body>

<div id="ui-overlay">
    <div class="top-row" style="display: flex; justify-content: space-between; width: 100%;">
        <div class="tactical-panel" style="width: 260px;">
            <div id="status-header">STRATOS // V26.0_LOW_LUM</div>
            <div class="btn-grid">
                <button onclick="engine.toggleCapture(true)">Connect</button>
                <button onclick="engine.toggleCapture(false)">Kill</button>
                <button style="grid-column: span 2;" onclick="engine.exportCSV()">Extract Telemetry</button>
                <button onclick="engine.reCenter()">Sync View</button>
                <button onclick="engine.clearTrail()" style="color: #662222;">Purge</button>
            </div>
            <div id="terminal">> System Stable. Low intensity mode active.</div>
        </div>

        <div class="tactical-panel">
            <div class="telemetry-item">SAT_NODES: <span id="val-count" class="val">0</span></div>
            <div class="telemetry-item">COORD_LAT: <span id="val-lat" class="val">0.000000</span></div>
            <div class="telemetry-item">COORD_LON: <span id="val-lon" class="val">0.000000</span></div>
            <div class="telemetry-item">SIG_ACC: <span id="val-acc" class="val">0</span>m</div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
class SentryEngine {
    constructor() {
        this.isCapturing = false;
        this.origin = null;
        this.zoom = 19;
        this.tileSize = 512;
        this.history = [];
        this.spheres = [];
        this.lastPosition = null;
        
        this.initCore();
        this.initEntities();
        this.animate();
    }

    latToY(lat, zoom) {
        const rad = lat * Math.PI / 180;
        return (1 - Math.log(Math.tan(rad) + 1 / Math.cos(rad)) / Math.PI) / 2 * Math.pow(2, zoom);
    }
    lonToX(lon, zoom) { return (lon + 180) / 360 * Math.pow(2, zoom); }

    initCore() {
        this.scene = new THREE.Scene();
        this.scene.fog = new THREE.FogExp2(0x00080a, 0.0015);
        
        this.camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 1, 30000);
        this.camera.position.set(0, 800, 600);

        this.renderer = new THREE.WebGLRenderer({ antialias: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.setClearColor(0x00080a);
        document.body.appendChild(this.renderer.domElement);

        this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
        this.controls.enableDamping = true;

        // --- MULTI-LIGHTING (LOW INTENSITY) ---
        // 1. Ambient (Base visibility)
        this.scene.add(new THREE.AmbientLight(0xffffff, 0.15));

        // 2. Main Key Light (Amber)
        this.keyLight = new THREE.DirectionalLight(0xffaa00, 0.5);
        this.keyLight.position.set(100, 500, 100);
        this.scene.add(this.keyLight);

        // 3. Rim Light (Cool Contrast)
        this.rimLight = new THREE.PointLight(0x00ffff, 0.4, 1500);
        this.scene.add(this.rimLight);

        // 4. Fill Light (Soft Magenta for shadow depth)
        const fill = new THREE.PointLight(0xff00ff, 0.1, 2000);
        fill.position.set(-500, 100, -500);
        this.scene.add(fill);
    }

    initEntities() {
        // DIAMOND - Low emissive, High metalness
        this.core = new THREE.Mesh(
            new THREE.OctahedronGeometry(12, 0),
            new THREE.MeshStandardMaterial({ 
                color: 0x221100, 
                emissive: 0xffaa00, 
                emissiveIntensity: 0.2, 
                metalness: 1, 
                roughness: 0.1 
            })
        );
        this.scene.add(this.core);
        this.tilesGroup = new THREE.Group();
        this.scene.add(this.tilesGroup);
    }

    handleGPS(pos) {
        this.lastPosition = pos;
        const { latitude, longitude, accuracy } = pos.coords;

        if (!this.origin) {
            this.origin = { x: this.lonToX(longitude, this.zoom), y: this.latToY(latitude, this.zoom), lat: latitude, lon: longitude };
            this.updateMap(latitude, longitude);
        }

        const tX = (this.lonToX(longitude, this.zoom) - this.origin.x) * this.tileSize;
        const tZ = (this.latToY(latitude, this.zoom) - this.origin.y) * this.tileSize;

        this.core.position.set(tX, 30, tZ);
        this.rimLight.position.set(tX + 50, 60, tZ + 50);

        document.getElementById('val-lat').innerText = latitude.toFixed(6);
        document.getElementById('val-lon').innerText = longitude.toFixed(6);
        document.getElementById('val-acc').innerText = Math.round(accuracy);
    }

    dropPacket() {
        if(!this.lastPosition || !this.isCapturing) return;
        const { latitude, longitude } = this.lastPosition.coords;
        const pX = (this.lonToX(longitude, this.zoom) - this.origin.x) * this.tileSize;
        const pZ = (this.latToY(latitude, this.zoom) - this.origin.y) * this.tileSize;

        this.history.push({ lat: latitude, lon: longitude, time: new Date().toLocaleTimeString() });

        const packet = new THREE.Mesh(
            new THREE.BoxGeometry(5, 5, 5),
            new THREE.MeshStandardMaterial({ 
                color: 0x004411, 
                emissive: 0x00ff66, 
                emissiveIntensity: 0.1, 
                roughness: 0.9 
            })
        );
        packet.position.set(pX, 2, pZ);
        this.scene.add(packet);
        this.spheres.push(packet);
        document.getElementById('val-count').innerText = this.history.length;
    }

    updateMap(lat, lon) {
        this.tilesGroup.clear();
        const xC = Math.floor(this.lonToX(lon, this.zoom));
        const yC = Math.floor(this.latToY(lat, this.zoom));
        const loader = new THREE.TextureLoader();

        for (let x = -1; x <= 1; x++) {
            for (let y = -1; y <= 1; y++) {
                const url = `https://tile.openstreetmap.org/${this.zoom}/${xC + x}/${yC + y}.png`;
                loader.load(url, (tex) => {
                    const mat = new THREE.MeshStandardMaterial({ 
                        map: tex, 
                        color: 0x00151a, // Darkened Map for readability
                        metalness: 0.0, 
                        roughness: 1.0 
                    });
                    const plane = new THREE.Mesh(new THREE.PlaneGeometry(this.tileSize, this.tileSize), mat);
                    plane.rotation.x = -Math.PI / 2;
                    plane.position.set((xC + x + 0.5 - this.origin.x) * this.tileSize, 0, (yC + y + 0.5 - this.origin.y) * this.tileSize);
                    this.tilesGroup.add(plane);
                });
            }
        }
    }

    toggleCapture(state) {
        if(state && !this.isCapturing) {
            this.watchID = navigator.geolocation.watchPosition(p => this.handleGPS(p), null, { enableHighAccuracy: true });
            this.logTimer = setInterval(() => this.dropPacket(), 1000);
            document.getElementById('terminal').innerText = "> PULSE ACTIVE";
        } else {
            navigator.geolocation.clearWatch(this.watchID);
            clearInterval(this.logTimer);
            document.getElementById('terminal').innerText = "> OFFLINE";
        }
        this.isCapturing = state;
    }

    reCenter() { if(this.core) this.controls.target.copy(this.core.position); }
    exportCSV() { /* same logic as v25 */ }
    clearTrail() {
        this.spheres.forEach(s => this.scene.remove(s));
        this.spheres = [];
        this.history = [];
        document.getElementById('val-count').innerText = "0";
    }

    animate() {
        requestAnimationFrame(() => this.animate());
        this.core.rotation.y += 0.02;
        this.core.rotation.z += 0.01;
        this.controls.update();
        this.renderer.render(this.scene, this.camera);
    }
}
const engine = new SentryEngine();
</script>
</body>
</html>
